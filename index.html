<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Sembang Maths</title>

<!-- FAVICON (browser tab icon) -->
<link rel="icon" type="image/png" href="icon-192.png">

<!-- APPLE ICON (iPhone home screen) -->
<link rel="apple-touch-icon" href="icon-192.png">

<!-- PWA MANIFEST -->
<link rel="manifest" href="manifest.json">

<!-- ICON FONT -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">

<link rel="stylesheet" href="index.css">

<meta name="theme-color" content="#111111">

</head>

<body>

<div class="overlay" onclick="closeSidebar()" id="overlay"></div>

<div class="sidebar" id="sidebar">

<div class="sidebar-profile" onclick="checkProfile()">
    <span class="material-symbols-rounded" id="profileIcon">person</span>
</div>

<div class="menu-item active" onclick="setActive(this);showPage('home')">
    <span class="material-symbols-rounded">home</span>
    <div class="label">Home</div>
</div>

<div class="menu-item" onclick="window.location.href='video.html'">
    <span class="material-symbols-rounded">play_circle</span>
    <div class="label">Video</div>
</div>

<div class="menu-item" onclick="window.location.href='pdf.html'">
    <span class="material-symbols-rounded">description</span>
    <div class="label">PDF</div>
</div>

<div class="menu-item" onclick="window.location.href='qna.html'">
    <span class="material-symbols-rounded">forum</span>
    <div class="label">Q&A</div>
</div>

</div>

<div id="app"></div>

<script>
function setActive(el){
    document.querySelectorAll(".menu-item").forEach(i=>{
        i.classList.remove("active");
    });
    el.classList.add("active");
}

/* SIDEBAR */
function openSidebar(){
    document.getElementById("sidebar").classList.add("active");
    document.getElementById("overlay").classList.add("active");
}

function closeSidebar(){
    document.getElementById("sidebar").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
}

function toggleSidebar(){
    document.getElementById("sidebar").classList.contains("active")
        ? closeSidebar()
        : openSidebar();
}

/* PAGE SYSTEM */
function showPage(page){

let content = "";

if(page === "home"){
content = `
<div class="header">
    <div class="hamburger" onclick="toggleSidebar()">☰</div>
    <div class="logo">Sembang Maths</div>
</div>

<div class="hero-card">
    <div class="hero-badge">Matematik Tambahan</div>

    <h1>Belajar Dengan Lebih Mudah.</h1>

    <p>Nota, video dan latihan dalam satu tempat.</p>

    <button class="hero-btn" onclick="window.location.href='video.html'">
        Mulakan Belajar
    </button>
</div>

<div class="quick-section">

    <div class="quick-card live" onclick="window.location.href='trylive.html'">
        <span class="material-symbols-rounded">live_tv</span>
        <h3>Study & Borak</h3>
        <p>Belajar sambil relaks.</p>
    </div>

</div>

<div class="social-section">

    <div class="home-social">

        <div class="social-icon">
            <span class="material-symbols-rounded">play_circle</span>
            <div>YouTube</div>
        </div>

        <div class="social-icon">
            <span class="material-symbols-rounded">send</span>
            <div>Telegram</div>
        </div>

        <div class="social-icon">
            <span class="material-symbols-rounded">music_note</span>
            <div>TikTok</div>
        </div>

    </div>

</div>
`;
}

document.getElementById("app").innerHTML = content;
closeSidebar();
}

showPage("home");
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCM7AcvKL5-rTm4kISFjU1GLE2IGU2stUM",
  authDomain: "sembang-maths.firebaseapp.com",
  projectId: "sembang-maths",
  storageBucket: "sembang-maths.firebasestorage.app",
  messagingSenderId: "949561490562",
  appId: "1:949561490562:web:0adfde880f6de95c03489b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.userLogged = false;

onAuthStateChanged(auth, (user)=>{
    if(user){
        window.userLogged = true;
        document.getElementById("profileIcon").textContent = "account_circle";
    }else{
        window.userLogged = false;
        document.getElementById("profileIcon").textContent = "person";
    }
});

window.checkProfile = function(){
    window.location.href = window.userLogged ? "profile.html" : "login.html";
}
</script>

</body>
</html>
