<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sembang Maths</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">
<link rel="stylesheet" href="index.css">

</head>

<body>

<div class="overlay" onclick="closeSidebar()" id="overlay"></div>

<div class="sidebar" id="sidebar">

    <div class="sidebar-profile" onclick="window.location.href='login.html'">
    <span class="material-symbols-rounded">person</span>
</div>

<div class="menu-item active">
    <span class="material-symbols-rounded">home</span>
    <div class="label">Home</div>
</div>

<div class="menu-item" onclick="window.location.href='video.html'">
    <span class="material-symbols-rounded">play_circle</span>
    <div class="label">Video</div>
</div>

<div class="menu-item" onclick="window.location.href='pdf.html'">
    <span class="material-symbols-rounded">description</span>
    <div class="label">PDF</div>
</div>

</div>

<div id="app"></div>


<script>


/* ACTIVE */
function setActive(el){
    document.querySelectorAll(".menu-item").forEach(i=>{
        i.classList.remove("active");
    });
    el.classList.add("active");
}

/* SIDEBAR */
function openSidebar(){
    document.getElementById("sidebar").classList.add("active");
    document.getElementById("overlay").classList.add("active");
}

function closeSidebar(){
    document.getElementById("sidebar").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
}

function toggleSidebar(){
    document.getElementById("sidebar").classList.contains("active")
        ? closeSidebar()
        : openSidebar();
}


/* PAGE */
function showPage(page){

let content = "";

if(page === "home"){
content = `
<div class="header">
    <div class="hamburger" onclick="toggleSidebar()">☰</div>
    <div class="logo">Sembang Maths</div>
    
</div>

<div class="card">Welcome ke Sembang Maths</div>

<div class="home-social">
    <div class="social-icon">
        <span class="material-symbols-rounded">play_circle</span>
        <div>YouTube</div>
    </div>
    <div class="social-icon">
        <span class="material-symbols-rounded">send</span>
        <div>Telegram</div>
    </div>
    <div class="social-icon">
        <span class="material-symbols-rounded">music_note</span>
        <div>TikTok</div>
    </div>
</div>
`;
}


document.getElementById("app").innerHTML = content;
closeSidebar();
}


/* INIT */
showPage("home");

</script>

</body>
</html>
