<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sembang Maths</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">

<style>

/* ================= BASE ================= */
html, body{
    margin:0;
    padding:0;
    height:100%;
    background:#f5eee4;
    font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial;
    overflow-x:hidden;
}

/* Animation */
/* ================= HEADER ANIMATION ================= */
@keyframes wipeIn {
    from{ transform:translateX(-25px); opacity:0; }
    to{ transform:translateX(0); opacity:1; }
}
/* ================= CARD ANIMATION ================= */
@keyframes wipeUp {
    from{ transform:translatey(25px); opacity:0; }
    to{ transform:translateX(0); opacity:1; }
}

/* ================= SIDEBAR ================= */
.sidebar{
    width:80px;
    height:100vh;
    position:fixed;
    top:0;
    left:-80px;
    background:#f5eee4;
    transition:0.15s ease;
    z-index:1001;

    display:flex;
    flex-direction:column;
    align-items:stretch;
}

.sidebar.active{
    left:0;
}

/* ================= PROFILE ================= */
.sidebar-profile{
    height:90px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

.sidebar-profile .material-symbols-rounded{
    font-size:38px;
}

    .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    display: none;
    z-index: 1000;
}
.overlay.active {
    display: block;
}


/* ================= MENU ITEM ================= */
.menu-item{
    height:75px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:3px;

    cursor:pointer;
    transition:0.2s ease;
}

.menu-item .material-symbols-rounded{
    font-size:26px;
    color:#111;
}

.label{
    font-size:11px;
    color:#333;
}

/* ================= HOVER ================= */
.menu-item:hover{
    background:#f0dde4;
}

/* ================= ACTIVE ================= */
.menu-item.active{
    background:#f0dde4;
    color:#850a37;
}

/* ================= HEADER ================= */
.header{
    background:#f5eee3;
    padding:16px 18px;
    display:flex;
    align-items:center;
    gap:12px;
    border-bottom:1px solid #ddd;
    
}

.logo{
    font-weight:600;
    color:#7a1230;
    font-size:20px;
    animation:wipeIn 1.5s ease;
}

.hamburger{
    cursor:pointer;
    font-size:22px;
    color:#7a1230;
    animation:wipeIn 1.5s ease;
}

/* ================= PDF CARD ================= */

.pdf-card{
    background:#fff;
    margin:14px 18px;
    padding:16px;
    border-radius:14px;
    animation:wipeUp 1.5s ease;

    display:flex;
    align-items:center;
    gap:14px;

    cursor:pointer;
    transition:.2s ease;

    box-shadow:0 2px 8px rgba(0,0,0,.06);
}

.pdf-card:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 16px rgba(0,0,0,.10);
}

.pdf-icon{
    width:50px;
    height:50px;
    border-radius:12px;
    background:#f0dde4;

    display:flex;
    align-items:center;
    justify-content:center;
}

.pdf-icon .material-symbols-rounded{
    font-size:28px;
    color:#7a1230;
}

.pdf-info{ flex:1; }

.pdf-title{
    font-size:15px;
    font-weight:600;
    color:#222;
    margin-bottom:4px;
}

.pdf-author{
    font-size:13px;
    color:#777;
}

.pdf-arrow .material-symbols-rounded{
    color:#999;
    font-size:24px;
}

/* ================= HOME SOCIAL ================= */
.home-social{
    position:fixed;
    bottom:18px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:4px;
    background:#f5eee4;
    padding:8px 12px;
    border-radius:100px;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.social-icon{
    display:flex;
    flex-direction:column;
    align-items:center;
    font-size:11px;
    cursor:pointer;
    padding:6px 10px;
    border-radius:100px;
    min-width:45px;
}

.social-icon .material-symbols-rounded{
    font-size:24px;
}

/* ================= MODAL PDF ================= */
#pdfModal{
    position:fixed;
    inset:0;
    background:#fff;
    display:none;
    z-index:3000;
    flex-direction:column;
    overflow:hidden;
}

#pdfHeader{
    height:50px;
    background:#7a1230;
    color:#fff;

    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 18px;

    position:relative;
    z-index:9999;
}

#pdfFrame{
    flex:1;
    width:100%;
    border:none;
}

button{
    background:transparent;
    border:1px solid #fff;
    color:#fff;
    padding:8px 12px;
    cursor:pointer;
    font-size:14px;
    border-radius:5px;
}

/* ================= FIX Z-INDEX ================= */
#app{ position:relative; z-index:1; }
.card{ position:relative; z-index:1; }
.sidebar{ z-index:1001; }
#pdfModal{ z-index:3000; }

.video-wrapper{
    width:100%;
    max-width:900px;
    margin:15px auto;
    aspect-ratio:16/9;
background: transparent;
}

.video-wrapper iframe{
    width:100%;
    height:100%;
    border:none;
    border-radius:12px;
}

.search-box{
    margin-left:auto;
    display:flex;
    align-items:center;
    background:#fff;
    padding:6px 10px;
    border-radius:20px;
    gap:6px;
    border:1px solid #ddd;
}

.search-box input{
    border:none;
    outline:none;
    font-size:14px;
    width:180px;
}

</style>
</head>

<body>

<div class="overlay" onclick="closeSidebar()" id="overlay"></div>

<div class="sidebar" id="sidebar">

    <div class="sidebar-profile" onclick="window.location.href='login.html'">
    <span class="material-symbols-rounded">person</span>
</div>

    <div class="menu-item" onclick="setActive(this); showPage('home')">
        <span class="material-symbols-rounded">home</span>
        <div class="label">Home</div>
    </div>

    <div class="menu-item" onclick="setActive(this); showPage('video')">
        <span class="material-symbols-rounded">play_circle</span>
        <div class="label">Video</div>
    </div>

    <div class="menu-item" onclick="setActive(this); showPage('pdf')">
        <span class="material-symbols-rounded">description</span>
        <div class="label">PDF</div>
    </div>

</div>

<div id="app"></div>

<!-- PDF MODAL -->
<div id="pdfModal">
    <div id="pdfHeader">
        <button onclick="closePDF()">Back</button>
        <div>PDF Viewer</div>
        <button onclick="openTabPDF()">Download</button>
    </div>
    <iframe id="pdfFrame"></iframe>
</div>

<script>

let selectedTrial = "";
let pdfCurrent = "";

/* ACTIVE */
function setActive(el){
    document.querySelectorAll(".menu-item").forEach(i=>{
        i.classList.remove("active");
    });
    el.classList.add("active");
}

/* SIDEBAR */
function openSidebar(){
    document.getElementById("sidebar").classList.add("active");
    document.getElementById("overlay").classList.add("active");
}

function closeSidebar(){
    document.getElementById("sidebar").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
}

function toggleSidebar(){
    document.getElementById("sidebar").classList.contains("active")
        ? closeSidebar()
        : openSidebar();
}

function openTrial(trialName){

    selectedTrial = trialName;

    const root = document.getElementById("pdfRoot");
    const list = document.getElementById("pdfList");

    if(!root || !list){
        console.log("PDF DOM belum ready");
        return;
    }

    root.style.display = "none";    
    list.style.display = "block";

    // load data
    loadPDF(trialName);

    function backToPdfRoot(){
    document.getElementById("pdfRoot").style.display = "block";
    document.getElementById("pdfList").style.display = "none";
}
}

/* PAGE */
function showPage(page){

let content = "";

if(page === "home"){
content = `
<div class="header">
    <div class="hamburger" onclick="toggleSidebar()">☰</div>
    <div class="logo">Sembang Maths</div>
</div>

<div class="card">Welcome ke Sembang Maths</div>

<div class="home-social">
    <div class="social-icon">
        <span class="material-symbols-rounded">play_circle</span>
        <div>YouTube</div>
    </div>
    <div class="social-icon">
        <span class="material-symbols-rounded">send</span>
        <div>Telegram</div>
    </div>
    <div class="social-icon">
        <span class="material-symbols-rounded">music_note</span>
        <div>TikTok</div>
    </div>
</div>
`;
}

if(page === "video"){
content = `
<div class="header">
    <div class="hamburger" onclick="toggleSidebar()">☰</div>
    <div class="logo">Video</div>

    <div class="search-box">
        <span class="material-symbols-rounded">search</span>
        <input type="text" id="videoSearch" placeholder="Cari video...">
    </div>
</div>

<div id="videoList">Loading...</div>
`;

document.getElementById("app").innerHTML = content;
closeSidebar();

setTimeout(() => {
  loadVideos();
}, 100);

return;
}

if(page === "pdf"){
content = `
<div class="header">
    <div class="hamburger" onclick="toggleSidebar()">☰</div>
    <div class="logo">PDF</div>


</div>

<div id="pdfRoot">
    <div class="pdf-card" onclick="openTrial('Trial 2024')">
        <div class="pdf-icon">
            <span class="material-symbols-rounded">folder</span>
        </div>
        <div class="pdf-info">
            <div class="pdf-title">Trial 2024</div>
        </div>
    </div>

    <div class="pdf-card" onclick="openTrial('Trial 2025')">
        <div class="pdf-icon">
            <span class="material-symbols-rounded">folder</span>
        </div>
        <div class="pdf-info">
            <div class="pdf-title">Trial 2025</div>
        </div>
    </div>
</div>

<div id="pdfList" style="display:none;"></div>
`;

document.getElementById("app").innerHTML = content;
closeSidebar();
return;
}

document.getElementById("app").innerHTML = content;
closeSidebar();
}

/* INIT */
showPage("home");

document.addEventListener("click", function(e){
    if(e.target && e.target.id === "backBtn"){
        backToPdfRoot();
    }
});

window.addEventListener("load", async ()=>{

    const hash = location.hash;

    if(!hash.startsWith("#pdf=")) return;

    const slug = hash.replace("#pdf=","");

    const url = "https://script.googleusercontent.com/macros/echo?user_content_key=AUkAhnQDJJ9QF61niN-W1etNpPBcz5gbJ6-syVIgR_RHMZ0r811P_8_2n_LEF0j2s7PJwgcQptZYYw6JfQ7SCEnbOVirJ-kUTE7_V9PSftSmqeaCSevDbVnkG7g82LGg8vVW0XGns2o7uh1egGnadJISjma0x_gfq2vGnT7UbKdbZxRgXSY8Gpl8-IIhyvhiSht8-kecjSl2odcgsG5TD2yT--WhNoyIbwLbpMBKybNoGwdWsdHKTQLnXMzbRCaIgjBzQ3SgU1W1PspUYSdF7sE10d0oLtVY8Q&lib=MaNxOnVwgQOM3tr6T5bPZndwti6VF2dMb";

    const res = await fetch(url);
    const data = await res.json();

    const item = data.find(x => x.Slug === slug);

    if(item){
        showPage("pdf");
        setTimeout(()=>{
            openPDF(item.Link, item.Slug);
        },500);
    }
});

/* LOAD PDF */
async function loadPDF(trial){

    const list = document.getElementById("pdfList");

    // 🔥 show loading dulu
    list.innerHTML = `
        <div style="text-align:center; padding:20px; color:#777;">
            Loading...
        </div>
    `;

    const url = "https://script.googleusercontent.com/macros/echo?user_content_key=AUkAhnQDJJ9QF61niN-W1etNpPBcz5gbJ6-syVIgR_RHMZ0r811P_8_2n_LEF0j2s7PJwgcQptZYYw6JfQ7SCEnbOVirJ-kUTE7_V9PSftSmqeaCSevDbVnkG7g82LGg8vVW0XGns2o7uh1egGnadJISjma0x_gfq2vGnT7UbKdbZxRgXSY8Gpl8-IIhyvhiSht8-kecjSl2odcgsG5TD2yT--WhNoyIbwLbpMBKybNoGwdWsdHKTQLnXMzbRCaIgjBzQ3SgU1W1PspUYSdF7sE10d0oLtVY8Q&lib=MaNxOnVwgQOM3tr6T5bPZndwti6VF2dMb";

    try {
        const res = await fetch(url);
        const data = await res.json();

        let html = "";

        // 🔥 TAK FILTER (buat dulu test stabil)
        data
  .filter(item => item.Trial === trial)
  .forEach(item => {

            html += `
            <div class="pdf-card">

                <div onclick="openPDF('${item.Link}','')" 
                     style="flex:1; display:flex; gap:14px; align-items:center;">

                    <div class="pdf-icon">
                        <span class="material-symbols-rounded">picture_as_pdf</span>
                    </div>

                    <div class="pdf-info">
                        <div class="pdf-title">${item.Title}</div>
                        <div class="pdf-author">Sir Maududi</div>
                    </div>

                </div>

            </div>
            `;
        });

        list.innerHTML = html;

    } catch (err) {
        list.innerHTML = `
            <div style="text-align:center; padding:20px; color:red;">
                Error load PDF
            </div>
        `;
    }
}

/* OPEN PDF */
function openPDF(link, slug){

if(!link) return;

let id = link.match(/[-\w]{25,}/);

let view = id 
    ? `https://drive.google.com/file/d/${id[0]}/preview`
    : link;

pdfCurrent = view.replace("/preview", "/view");

if(slug){
    location.hash = "pdf=" + slug;
}

document.getElementById("pdfFrame").src = view;
document.getElementById("pdfModal").style.display = "flex";
}

/* CLOSE PDF */
function closePDF(){
    document.getElementById("pdfModal").style.display = "none";
    document.getElementById("pdfFrame").src = "";
}

/* DOWNLOAD PDF */
function openTabPDF(){
    if(!pdfCurrent) return;

    let downloadLink = pdfCurrent.replace("/view", "/export?format=pdf");

    window.open(downloadLink, "_blank");
}

function copyLink(slug){
    const link = window.location.origin + "#pdf=" + slug;
    navigator.clipboard.writeText(link);
    alert("Link copied!");
}

</script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// Import the functions you need from the SDKs you need
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyCM7AcvKL5-rTm4kISFjU1GLE2IGU2stUM",
  authDomain: "sembang-maths.firebaseapp.com",
  projectId: "sembang-maths",
  storageBucket: "sembang-maths.firebasestorage.app",
  messagingSenderId: "949561490562",
  appId: "1:949561490562:web:0adfde880f6de95c03489b"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);  

const db = getFirestore(app);
const auth = getAuth();

onAuthStateChanged(auth, (user) => {
  if (user) {
    window.currentUser = {
      email: user.email,
      uid: user.uid,
      loggedIn: true
    };

    console.log("LOGIN USER:", user.email);

    // reload video bila user ready
    if (typeof loadVideos === "function") {
      loadVideos();
    }

  } else {
    window.currentUser = {
      loggedIn: false
    };
  }
});

// contoh user (nanti kita connect login)
const user = {
  loggedIn: false,
  group: "A"
};

//  LOAD VIDEO
window.loadVideos = async function(){

  const videoContainer = document.getElementById("videoList");

  if(!videoContainer){
    console.log("videoList belum wujud");
    return;
  }

  try {
    const querySnapshot = await getDocs(collection(db, "videos"));

    console.log("DATA:", querySnapshot.size);

    let html = "";

    querySnapshot.forEach((doc) => {
      const v = doc.data();

      console.log(v);

      if (
  v.access === "free" ||
  v.allowedEmails?.includes(window.currentUser?.email)
) {

  // ❌ kalau tak ada apa-apa video, terus skip
  if (!v.youtubeIds && !v.youtubeId) return;

  html += `<div style="margin:10px;padding:10px;border-radius:10px;">
    <h3>${v.title}</h3>`;

  // ✅ kalau ada array (baru)
  if (v.youtubeIds && Array.isArray(v.youtubeIds) && v.youtubeIds.length > 0) {
    v.youtubeIds.forEach(id => {
      html += `
        <div class="video-wrapper" style="margin-top:10px;">
          <iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>
        </div>
      `;
    });
  }

  // ✅ kalau masih guna single (lama)
  else if (v.youtubeId) {
    html += `
      <div class="video-wrapper" style="margin-top:10px;">
        <iframe src="https://www.youtube.com/embed/${v.youtubeId}" allowfullscreen></iframe>
      </div>
    `;
  }

  html += `</div>`;
}
    });

    videoContainer.innerHTML = html;

  } catch (err) {
    console.error(err);
    videoContainer.innerHTML = "Error load video";
  }
}

loadVideos();
</script>
</body>
</html>
