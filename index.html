function setActive(el){
    document.querySelectorAll(".menu-item").forEach(i=>{
        i.classList.remove("active");
    });
    el.classList.add("active");
}

/* SIDEBAR */
function openSidebar(){
    document.getElementById("sidebar").classList.add("active");
    document.getElementById("overlay").classList.add("active");
}

function closeSidebar(){
    document.getElementById("sidebar").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
}

function toggleSidebar(){
    document.getElementById("sidebar").classList.contains("active")
        ? closeSidebar()
        : openSidebar();
}

// ===============================
// BACKGROUND PRELOAD
// ===============================

preloadData();



async function preloadData(){

    const cache = localStorage.getItem("pdfData");


    if(cache){

        console.log("PDF guna cache");

        return;
    }


    try{

        const url =
        "https://script.google.com/macros/s/AKfycbxA1tFgvgFu7RBTFb-zoE9CIF06JW5t6X4d3VGyws62yJxHewGuLnyjGJj2pB-naaFM/exec";


        const response = await fetch(url);


        const data = await response.json();


        localStorage.setItem(
            "pdfData",
            JSON.stringify(data)
        );


        console.log(
            "PDF cache siap:",
            data.length
        );


    }catch(error){

        console.log(
            "Preload gagal",
            error
        );

    }

}
</script>
