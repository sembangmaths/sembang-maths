<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sembang Maths</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">

<style>

/* ================= BASE ================= */
html, body{
    margin:0;
    padding:0;
    height:100%;
    background:#f5eee4;
    font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial;
    overflow-x:hidden;
}

/* ================= HEADER ANIMATION ================= */
@keyframes wipeIn {
    from{ transform:translateX(-25px); opacity:0; }
    to{ transform:translateX(0); opacity:1; }
}

/* ================= SIDEBAR ================= */
.sidebar{
    width:80px;
    height:100vh;
    position:fixed;
    top:0;
    left:-80px;
    background:#f5eee4;
    transition:0.15s ease;
    z-index:1001;

    display:flex;
    flex-direction:column;
    align-items:stretch;
}

.sidebar.active{
    left:0;
}

/* ================= PROFILE ================= */
.sidebar-profile{
    height:90px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

.sidebar-profile .material-symbols-rounded{
    font-size:38px;
}

/* ================= MENU ITEM ================= */
.menu-item{
    height:75px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:3px;

    cursor:pointer;
    transition:0.2s ease;
}

.menu-item .material-symbols-rounded{
    font-size:26px;
    color:#111;
}

.label{
    font-size:11px;
    color:#333;
}

/* ================= HOVER ================= */
.menu-item:hover{
    background:#f0dde4;
}

/* ================= ACTIVE ================= */
.menu-item.active{
    background:#f0dde4;
    color:#850a37;
}

/* ================= HEADER ================= */
.header{
    background:#f5eee3;
    padding:16px 18px;
    display:flex;
    align-items:center;
    gap:12px;
    border-bottom:1px solid #ddd;
    animation:wipeIn 1.5s ease;
}

.logo{
    font-weight:600;
    color:#7a1230;
    font-size:18px;
}

.hamburger{
    cursor:pointer;
    font-size:22px;
}

/* ================= PDF CARD ================= */

.pdf-card{
    background:#fff;
    margin:14px 18px;
    padding:16px;
    border-radius:14px;

    display:flex;
    align-items:center;
    gap:14px;

    cursor:pointer;
    transition:.2s ease;

    box-shadow:0 2px 8px rgba(0,0,0,.06);
}

.pdf-card:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 16px rgba(0,0,0,.10);
}

.pdf-icon{
    width:50px;
    height:50px;
    border-radius:12px;
    background:#f0dde4;

    display:flex;
    align-items:center;
    justify-content:center;
}

.pdf-icon .material-symbols-rounded{
    font-size:28px;
    color:#7a1230;
}

.pdf-info{ flex:1; }

.pdf-title{
    font-size:15px;
    font-weight:600;
    color:#222;
    margin-bottom:4px;
}

.pdf-author{
    font-size:13px;
    color:#777;
}

.pdf-arrow .material-symbols-rounded{
    color:#999;
    font-size:24px;
}

/* ================= HOME SOCIAL ================= */
.home-social{
    position:fixed;
    bottom:18px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:4px;
    background:#f5eee4;
    padding:8px 12px;
    border-radius:100px;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.social-icon{
    display:flex;
    flex-direction:column;
    align-items:center;
    font-size:11px;
    cursor:pointer;
    padding:6px 10px;
    border-radius:100px;
    min-width:45px;
}

.social-icon .material-symbols-rounded{
    font-size:24px;
}

/* ================= MODAL PDF ================= */
#pdfModal{
    position:fixed;
    inset:0;
    background:#fff;
    display:none;
    z-index:3000;
    flex-direction:column;
    overflow:hidden;
}

#pdfHeader{
    height:65px;
    background:#7a1230;
    color:#fff;

    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 18px;

    position:relative;
    z-index:9999;
}

#pdfFrame{
    flex:1;
    width:100%;
    border:none;
}

button{
    background:transparent;
    border:1px solid #fff;
    color:#fff;
    padding:8px 12px;
    cursor:pointer;
    font-size:14px;
}

/* ================= FIX Z-INDEX ================= */
#app{ position:relative; z-index:1; }
.card{ position:relative; z-index:1; }
.sidebar{ z-index:1001; }
#pdfModal{ z-index:3000; }

</style>
</head>

<body>

<div class="overlay" onclick="closeSidebar()" id="overlay"></div>

<div class="sidebar" id="sidebar">

    <div class="sidebar-profile">
        <span class="material-symbols-rounded">person</span>
    </div>

    <div class="menu-item" onclick="setActive(this); showPage('home')">
        <span class="material-symbols-rounded">home</span>
        <div class="label">Home</div>
    </div>

    <div class="menu-item" onclick="setActive(this); showPage('video')">
        <span class="material-symbols-rounded">play_circle</span>
        <div class="label">Video</div>
    </div>

    <div class="menu-item" onclick="setActive(this); showPage('pdf')">
        <span class="material-symbols-rounded">description</span>
        <div class="label">PDF</div>
    </div>

</div>

<div id="app"></div>

<!-- PDF MODAL -->
<div id="pdfModal">
    <div id="pdfHeader">
        <button onclick="closePDF()">Back</button>
        <div>PDF Viewer</div>
        <button onclick="openTabPDF()">Download</button>
    </div>
    <iframe id="pdfFrame"></iframe>
</div>

<script>

let pdfCurrent = "";

/* ACTIVE */
function setActive(el){
    document.querySelectorAll(".menu-item").forEach(i=>{
        i.classList.remove("active");
    });
    el.classList.add("active");
}

/* SIDEBAR */
function openSidebar(){
    document.getElementById("sidebar").classList.add("active");
    document.getElementById("overlay").classList.add("active");
}

function closeSidebar(){
    document.getElementById("sidebar").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
}

function toggleSidebar(){
    document.getElementById("sidebar").classList.contains("active")
        ? closeSidebar()
        : openSidebar();
}

/* PAGE */
function showPage(page){

let content = "";

if(page === "home"){
content = `
<div class="header">
    <div class="hamburger" onclick="toggleSidebar()">☰</div>
    <div class="logo">Sembang Maths</div>
</div>

<div class="card">Welcome ke Sembang Maths</div>

<div class="home-social">
    <div class="social-icon">
        <span class="material-symbols-rounded">play_circle</span>
        <div>YouTube</div>
    </div>
    <div class="social-icon">
        <span class="material-symbols-rounded">send</span>
        <div>Telegram</div>
    </div>
    <div class="social-icon">
        <span class="material-symbols-rounded">music_note</span>
        <div>TikTok</div>
    </div>
</div>
`;
}

if(page === "video"){
content = `
<div class="header">
    <div class="hamburger" onclick="toggleSidebar()">☰</div>
    <div class="logo">Video</div>
</div>

<div class="card">Video page</div>
`;
}

if(page === "pdf"){
content = `
<div class="header">
    <div class="hamburger" onclick="toggleSidebar()">☰</div>
    <div class="logo">PDF</div>
</div>

<div id="pdfList" class="card">Loading PDF...</div>
`;

document.getElementById("app").innerHTML = content;
closeSidebar();
loadPDF();
return;
}

document.getElementById("app").innerHTML = content;
closeSidebar();
}

/* INIT */
showPage("home");

window.addEventListener("load", async ()=>{

    const hash = location.hash;

    if(!hash.startsWith("#pdf=")) return;

    const slug = hash.replace("#pdf=","");

    const url = "https://opensheet.elk.sh/1_Z68XSNfKmu9kuhISkJDqS03lK7dGbuoeZFfqL1edY4/pdf";

    const res = await fetch(url);
    const data = await res.json();

    const item = data.find(x => x.Slug === slug);

    if(item){
        showPage("pdf");
        setTimeout(()=>{
            openPDF(item.Link, item.Slug);
        },500);
    }
});

/* LOAD PDF */
async function loadPDF(){

const url = "https://opensheet.elk.sh/1_Z68XSNfKmu9kuhISkJDqS03lK7dGbuoeZFfqL1edY4/pdf";

try {
    const res = await fetch(url);
    const data = await res.json();

    let html = "";

    data.forEach(item => {
   html += `
    <div class="pdf-card">

        <div onclick="openPDF('${item.Link}','${item.Slug}')" style="flex:1; display:flex; gap:14px; align-items:center;">

            <div class="pdf-icon">
                <span class="material-symbols-rounded">picture_as_pdf</span>
            </div>

            <div class="pdf-info">
                <div class="pdf-title">${item.Title}</div>
                <div class="pdf-author">${item.Author}</div>
            </div>

        </div>

        <div class="pdf-arrow" onclick="copyLink('${item.Slug}')">
            <span class="material-symbols-rounded">link</span>
        </div>

    </div>
`;
});

    document.getElementById("pdfList").innerHTML = html;

} catch (err) {
    document.getElementById("pdfList").innerHTML =
        "Gagal load PDF data";
}
}

/* OPEN PDF */
function openPDF(link, slug){

if(!link) return;

let id = link.match(/[-\w]{25,}/);

let view = id 
    ? `https://drive.google.com/file/d/${id[0]}/preview`
    : link;

pdfCurrent = view.replace("/preview", "/view");

if(slug){
    location.hash = "pdf=" + slug;
}

document.getElementById("pdfFrame").src = view;
document.getElementById("pdfModal").style.display = "flex";
}

/* CLOSE PDF */
function closePDF(){
    document.getElementById("pdfModal").style.display = "none";
    document.getElementById("pdfFrame").src = "";
}

/* DOWNLOAD PDF */
function openTabPDF(){
    if(!pdfCurrent) return;
    window.open(pdfCurrent, "_blank");
}

function copyLink(slug){
    const link = window.location.origin + "#pdf=" + slug;
    navigator.clipboard.writeText(link);
    alert("Link copied!");
}

</script>

</body>
</html>
