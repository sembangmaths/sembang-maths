<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Sembang Maths</title>

<!-- FAVICON (browser tab icon) -->
<link rel="icon" type="image/png" href="icon-192.png">

<!-- APPLE ICON (iPhone home screen) -->
<link rel="apple-touch-icon" href="icon-192.png">

<!-- PWA MANIFEST -->
<link rel="manifest" href="manifest.json">

<!-- ICON FONT -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">

<link rel="stylesheet" href="login.css">

<meta name="theme-color" content="#111111">

</head>

<body>

<!-- CLOSE -->
<div class="close-btn" onclick="window.location.href='index.html'">
    <span class="material-symbols-rounded">close</span>
</div>

<!-- LOGIN BOX -->
<div class="login-box">

    <div class="title">Sembang Maths</div>

    <div class="input-box">
        <label>Login</label>
        <input type="email" placeholder="Enter email">
    </div>

    <div class="input-box">
        <label>Password</label>
        <input type="password" placeholder="Enter password">
    </div>

<button id="loginBtn" onclick="login()">
    LOGIN
</button>

    <div class="small-text">
    <span class="link" onclick="resetPassword()">
        Forgot your password?
    </span>
</div>

    <div class="divider">or</div>

<div class="small-text">
    Not yet registered? 
    <span class="link" onclick="window.location.href='signup.html'">
        Sign up
    </span>
</div>

    <div class="small-text" style="margin-top:14px;">
        By using this application, you agree to the Terms of use and Privacy policy
    </div>

</div>


<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
doc,
updateDoc
} from
"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyCM7AcvKL5-rTm4kISFjU1GLE2IGU2stUM",
  authDomain: "sembang-maths.firebaseapp.com",
  projectId: "sembang-maths",
  storageBucket: "sembang-maths.firebasestorage.app",
  messagingSenderId: "949561490562",
  appId: "1:949561490562:web:0adfde880f6de95c03489b"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

window.login = function () {


const email = document.querySelectorAll("input")[0].value;
const password = document.querySelectorAll("input")[1].value;


const btn = document.getElementById("loginBtn");

btn.disabled = true;
btn.innerHTML = `
    LOGIN
    <span class="spinner"></span>
`;



signInWithEmailAndPassword(auth,email,password)

.then(async (userCredential)=>{


const user = userCredential.user;


await updateDoc(
doc(db,"users",user.uid),
{
lastLogin:new Date()
}
);


window.location.href="index.html";


})


.catch((error)=>{


alert("Login gagal: "+error.message);


// restore button
btn.disabled = false;
btn.innerHTML="LOGIN";


});


}

window.resetPassword = function () {

    const email = prompt("Enter your registered email address:");

    if (!email) {
        return;
    }

    sendPasswordResetEmail(auth, email)
    .then(() => {

        alert("A password reset link has been sent to your email.\n\nIf you don't see it, please check your Spam or Junk folder.");

    })
    .catch((error) => {

        alert("Failed to send reset email: " + error.message);

    });

}
</script>

<script src="preload.js"></script>

</body>
</html>
