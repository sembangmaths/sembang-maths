<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Sembang Maths</title>

<!-- FAVICON (browser tab icon) -->
<link rel="icon" type="image/png" href="icon-192.png">

<!-- APPLE ICON (iPhone home screen) -->
<link rel="apple-touch-icon" href="icon-192.png">

<!-- PWA MANIFEST -->
<link rel="manifest" href="manifest.json">

<!-- ICON FONT -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">

<link rel="stylesheet" href="profile.css">

<meta name="theme-color" content="#111111">

</head>


<body>

<div class="top-bar">

    <div></div>

    <div 
      style="margin-left:auto;cursor:pointer;color:#7a1230;"
      onclick="window.location.href='index.html'">
      
      <span class="material-symbols-rounded">
        close
      </span>

    </div>

</div>


<div class="profile-card">

<div 
id="profileImageBox" 
class="profile-image-box">

</div>


<h2 id="userName">
    Loading...
</h2>


<p id="userEmail">
    Loading...
</p>


<button class="profile-btn" onclick="changeName()">
    Change Name
</button>


<button class="profile-btn" onclick="changePassword()">
    Reset Password
</button>


<button class="profile-btn logout-btn" onclick="logout()">
    Logout
</button>


</div>




<script type="module">


import { initializeApp } from 
"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";


import {

getAuth,
onAuthStateChanged,
signOut,
updateProfile,
sendPasswordResetEmail

} from
"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
doc,
updateDoc,
getDoc
} from
"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";



const firebaseConfig = {

apiKey: "AIzaSyCM7AcvKL5-rTm4kISFjU1GLE2IGU2stUM",
authDomain: "sembang-maths.firebaseapp.com",
projectId: "sembang-maths",
storageBucket: "sembang-maths.firebasestorage.app",
messagingSenderId: "949561490562",
appId: "1:949561490562:web:0adfde880f6de95c03489b"

};


const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

function getInitial(name){

if(!name) return "?";

let words=name.trim().split(" ");

if(words.length>=2){

return (
words[0][0]+
words[1][0]
).toUpperCase();

}

return name.substring(0,2).toUpperCase();

}


function loadLocalProfile(name){

const box =
document.getElementById("profileImageBox");


if(!box) return;


if(name){

box.innerHTML=`

<div class="profile-initial">
${getInitial(name)}
</div>

`;

}

}




onAuthStateChanged(auth,async(user)=>{


if(user){


document.getElementById("userName").textContent =
user.displayName || "User";


document.getElementById("userEmail").textContent =
user.email;



const userDoc = await getDoc(
doc(db,"users",user.uid)
);



if(userDoc.exists()){

const data=userDoc.data();


if(data.name){

localStorage.setItem(
"userName",
data.name
);

document.getElementById("userName").textContent =
data.name;


loadLocalProfile(data.name);

}

}



loadLocalProfile();



}else{


window.location.href="login.html";


}


});








window.logout = function(){

    const confirmLogout = confirm("Are you sure you want to log out from Sembang Maths?");

    if(confirmLogout){

        signOut(auth)
        .then(()=>{

            alert("You have been logged out successfully.");

            setTimeout(()=>{

                window.location.href="login.html";

            },1000);

        });

    }

}

window.changeName = async function(){

    const newName = prompt("Enter your new name:");

    if(!newName) return;


    const user = auth.currentUser;


    try{


        // update Firebase Authentication

        await updateProfile(user,{
            displayName:newName
        });


        // update Firestore

        await updateDoc(
            doc(db,"users",user.uid),
            {
                name:newName
            }
        );


        // update localStorage supaya semua page terus berubah

        localStorage.setItem(
        "userName",
        newName
        );


        document.getElementById("userName").textContent = newName;


        // update initial huruf
        loadLocalProfile(newName);


        alert("Name updated successfully.");

    }catch(error){


        alert("Failed to update name: " + error.message);


    }

}

window.changePassword = async function(){

    const user = auth.currentUser;

    try{

        await sendPasswordResetEmail(auth,user.email);

        alert(
            "A password reset link has been sent to your email.\n\nPlease check your inbox. If you cannot find the email, check your Spam or Junk folder."
        );

    }catch(error){

        alert("Failed to send reset email: " + error.message);

    }

}



</script>

<script type="module" src="user-profile.js"></script>

<script src="preload.js"></script>

</body>

</html>
