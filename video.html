<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sembang Maths</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">
<link rel="stylesheet" href="video.css">
</head>

<body>

<div class="overlay" onclick="closeSidebar()" id="overlay"></div>

<div class="sidebar" id="sidebar">

  <div class="sidebar-profile" onclick="window.location.href='login.html'">
    <span class="material-symbols-rounded">person</span>
  </div>

  <div class="menu-item" onclick="setActive(this); window.location.href='index.html'">
    <span class="material-symbols-rounded">home</span>
    <div class="label">Home</div>
  </div>

  <div class="menu-item active" onclick="setActive(this)">
    <span class="material-symbols-rounded">play_circle</span>
    <div class="label">Video</div>
  </div>

  <div class="menu-item" onclick="setActive(this); window.location.href='pdf.html'">
    <span class="material-symbols-rounded">description</span>
    <div class="label">PDF</div>
  </div>

</div>

<div id="app"></div>

<script>
let selectedChapter = "";

/* ================= SIDEBAR ================= */
function setActive(el){
  document.querySelectorAll(".menu-item").forEach(i=>{
    i.classList.remove("active");
  });
  el.classList.add("active");
}

function openSidebar(){
  document.getElementById("sidebar").classList.add("active");
  document.getElementById("overlay").classList.add("active");
}

function closeSidebar(){
  document.getElementById("sidebar").classList.remove("active");
  document.getElementById("overlay").classList.remove("active");
}

function toggleSidebar(){
  document.getElementById("sidebar").classList.contains("active")
    ? closeSidebar()
    : openSidebar();
}

/* ================= CHAPTER DATA ================= */
const chapters = {
  form4: [
    { name: "Form 4 Chapter 1: Functions", label: "Fungsi / <i>Functions</i>" },
    { name: "Form 4 Chapter 2: Quadratic Functions", label: "Fungsi Kuadratik / <i>Quadratic Functions</i>" },
    { name: "Form 4 Chapter 3: System of Equations", label: "Sistem Persamaan / <i>Systems of Equations</i>" },
    { name: "Form 4 Chapter 4: Indices, Surd and Logarithms", label: "Indeks, Surd dan Logaritma / <i>Indices, Surds and Logarithms</i>" },
    { name: "Form 4 Chapter 5: Progressions", label: "Janjang / <i>Progressions</i>" },
    { name: "Form 4 Chapter 6: Linear Law", label: "Hukum Linear / <i>Linear Law</i>" },
    { name: "Form 4 Chapter 7: Coordinate Geometry", label: "Geometri Koordinat / <i>Coordinate Geometry</i>" },
    { name: "Form 4 Chapter 8: Vectors", label: "Vektor / <i>Vectors</i>" },
    { name: "Form 4 Chapter 9: Solutions of Triangles", label: "Penyelesaian Segi Tiga / <i>Solutions of Triangles</i>" },
    { name: "Form 4 Chapter 10: Index Numbers", label: "Nombor Indeks / <i>Index Number</i>" }
  ],

  form5: [
    { name: "Form 5 Chapter 1: Circular Measure", label: "Sukatan Membulat / <i>Circular Measure</i>" },
    { name: "Form 5 Chapter 2: Differentiation", label: "Pembezaan / <i>Differentiation</i>" },
    { name: "Form 5 Chapter 3: Integration", label: "Pengamiran / <i>Integration</i>" },
    { name: "Form 5 Chapter 4: Permutation and Combination", label: "Pilih Atur dan Gabungan / <i>Permutation and Combination</i>" },
    { name: "Form 5 Chapter 5: Probability Distribution", label: "Taburan Kebarangkalian / <i>Probability Distribution</i>" },
    { name: "Form 5 Chapter 6: Trigonometric Functions", label: "Fungsi Trigonometri / <i>Trigonometric Functions</i>" },
    { name: "Form 5 Chapter 7: Linear Programming", label: "Pengaturcaraan Linear / <i>Linear Programming</i>" },
    { name: "Form 5 Chapter 8: Kinematics", label: "Kinematik Gerakan Linear / <i>Kinematics of Linear Motion</i>" }
  ]
};

/* ================= TAB SWITCH ================= */
function switchForm(form, el){

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");

  renderChapters(form);
}

/* ================= RENDER CHAPTER ================= */
function renderChapters(form){

  const root = document.getElementById("videoRoot");

  let html = "";

  chapters[form].forEach(c=>{
    html += `
      <div class="video-card" onclick="openChapter('${c.name}')">
        <div class="video-icon">
          <span class="material-symbols-rounded">video_library</span>
        </div>
        <div class="video-info">
          <div class="video-title">${c.name.split(":")[0]}</div>
          <div class="video-title">${c.label}</div>
        </div>
      </div>
    `;
  });

  root.innerHTML = html;
}

/* ================= OPEN CHAPTER ================= */
function openChapter(chapterName){

  selectedChapter = chapterName;

  const root = document.getElementById("videoRoot");
  const list = document.getElementById("videoList");

  root.style.display = "none";
  list.style.display = "block";

  document.getElementById("backBtn").style.display = "block";

}

/* ================= BACK ================= */
function backToVideoRoot(){
  document.getElementById("videoRoot").style.display = "block";
  document.getElementById("videoList").style.display = "none";
  document.getElementById("backBtn").style.display = "none";
}

/* ================= PAGE ================= */
function showPage(){

  const content = `
  <div class="header">
    <div class="hamburger" onclick="toggleSidebar()">☰</div>
    <div class="logo">Video</div>

<div class="tabs">
  <div class="tab-slider" id="tabSlider"></div>

  <div class="tab active" onclick="switchForm('form4', this)">Form 4</div>
  <div class="tab" onclick="switchForm('form5', this)">Form 5</div>
</div>

    <div id="backBtn"
      style="margin-left:auto;cursor:pointer;color:#7a1230;display:none;"
      onclick="backToVideoRoot()">
      <span class="material-symbols-rounded">close</span>
    </div>
  </div>

  <div id="videoRoot"></div>
  <div id="videoList" style="display:none;"></div>
  `;

  document.getElementById("app").innerHTML = content;
  closeSidebar();

  setTimeout(()=>{
    renderChapters("form4"); // DEFAULT FORM 4
  },100);
}

function switchForm(form, el){

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");

  renderChapters(form);

  const slider = document.getElementById("tabSlider");

  if(form === "form5"){
    slider.style.transform = "translateX(100%)";
  } else {
    slider.style.transform = "translateX(0%)";
  }
}

showPage();
</script>


<script type="module">

</script>

</body>
</html>
