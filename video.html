<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sembang Maths</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">
<link rel="stylesheet" href="video.css">
</head>

<body>

<div id="loadingScreen">

    <div class="loader"></div>

    <p>
        Loading...
    </p>

</div>

<div class="overlay" onclick="closeSidebar()" id="overlay"></div>

<div class="sidebar" id="sidebar">

  <div class="sidebar-profile" onclick="checkProfile()">
    <span class="material-symbols-rounded" id="profileIcon">
        person
    </span>
</div>
  

  <div class="menu-item" onclick="setActive(this); window.location.href='index.html'">
    <span class="material-symbols-rounded">home</span>
    <div class="label">Home</div>
  </div>

  <div class="menu-item active" onclick="setActive(this)">
    <span class="material-symbols-rounded">play_circle</span>
    <div class="label">Video</div>
  </div>

  <div class="menu-item" onclick="setActive(this); window.location.href='pdf.html'">
    <span class="material-symbols-rounded">description</span>
    <div class="label">PDF</div>
  </div>

</div>

<div id="app"></div>

<script>

let currentForm = "form4";

let selectedChapter = "";

/* ================= SIDEBAR ================= */
function setActive(el){
  document.querySelectorAll(".menu-item").forEach(i=>{
    i.classList.remove("active");
  });
  el.classList.add("active");
}

function openSidebar(){
  document.getElementById("sidebar").classList.add("active");
  document.getElementById("overlay").classList.add("active");
}

function closeSidebar(){
  document.getElementById("sidebar").classList.remove("active");
  document.getElementById("overlay").classList.remove("active");
}

function toggleSidebar(){
  document.getElementById("sidebar").classList.contains("active")
    ? closeSidebar()
    : openSidebar();
}

/* ================= CHAPTER DATA ================= */
const chapters = {


form4:[

{
key:"form4_chapter1_functions",
name:"Form 4 Chapter 1: Functions",
label:"Fungsi / <i>Functions</i>"
},


{
key:"form4_chapter2_quadratic_functions",
name:"Form 4 Chapter 2: Quadratic Functions",
label:"Fungsi Kuadratik / <i>Quadratic Functions</i>"
},


{
key:"form4_chapter3_systems_of_equations",
name:"Form 4 Chapter 3: Systems of Equations",
label:"Sistem Persamaan / <i>Systems of Equations</i>"
},


{
key:"form4_chapter4_indices_surds_logarithms",
name:"Form 4 Chapter 4: Indices, Surds and Logarithms",
label:"Indeks, Surd dan Logaritma / <i>Indices, Surds and Logarithms</i>"
},


{
key:"form4_chapter5_progressions",
name:"Form 4 Chapter 5: Progressions",
label:"Janjang / <i>Progressions</i>"
},


{
key:"form4_chapter6_linear_law",
name:"Form 4 Chapter 6: Linear Law",
label:"Hukum Linear / <i>Linear Law</i>"
},


{
key:"form4_chapter7_coordinate_geometry",
name:"Form 4 Chapter 7: Coordinate Geometry",
label:"Geometri Koordinat / <i>Coordinate Geometry</i>"
},


{
key:"form4_chapter8_vectors",
name:"Form 4 Chapter 8: Vectors",
label:"Vektor / <i>Vectors</i>"
},


{
key:"form4_chapter9_solutions_of_triangles",
name:"Form 4 Chapter 9: Solutions of Triangles",
label:"Penyelesaian Segi Tiga / <i>Solutions of Triangles</i>"
},


{
key:"form4_chapter10_index_number",
name:"Form 4 Chapter 10: Index Number",
label:"Nombor Indeks / <i>Index Number</i>"
}


],





form5:[


{
key:"form5_chapter1_circular_measure",
name:"Form 5 Chapter 1: Circular Measure",
label:"Sukatan Membulat / <i>Circular Measure</i>"
},


{
key:"form5_chapter2_differentiation",
name:"Form 5 Chapter 2: Differentiation",
label:"Pembezaan / <i>Differentiation</i>"
},


{
key:"form5_chapter3_integration",
name:"Form 5 Chapter 3: Integration",
label:"Pengamiran / <i>Integration</i>"
},


{
key:"form5_chapter4_permutation_combination",
name:"Form 5 Chapter 4: Permutation and Combination",
label:"Pilih Atur dan Gabungan / <i>Permutation and Combination</i>"
},


{
key:"form5_chapter5_probability_distribution",
name:"Form 5 Chapter 5: Probability Distribution",
label:"Taburan Kebarangkalian / <i>Probability Distribution</i>"
},


{
key:"form5_chapter6_trigonometric_functions",
name:"Form 5 Chapter 6: Trigonometric Functions",
label:"Fungsi Trigonometri / <i>Trigonometric Functions</i>"
},


{
key:"form5_chapter7_linear_programming",
name:"Form 5 Chapter 7: Linear Programming",
label:"Pengaturcaraan Linear / <i>Linear Programming</i>"
},


{
key:"form5_chapter8_kinematics",
name:"Form 5 Chapter 8: Kinematics",
label:"Kinematik Gerakan Linear / <i>Kinematics of Linear Motion</i>"
}


]


};



const freeChapters=[

"form4_chapter10_index_number"

];

/* ================= RENDER CHAPTER ================= */
function renderChapters(form){

  const root = document.getElementById("videoRoot");

  let html = "";


  chapters[form].forEach(c=>{


const hasAccess =

freeChapters.includes(c.key)

||

window.userAccess[c.key] === true;



    html += `

    <div class="video-card"

    onclick="${
    hasAccess
    ?
    `openChapter('${c.name}')`
:
`lockedAlert('${c.name}')`
    }">


        <div class="video-icon">

        <span class="material-symbols-rounded">

        ${
        hasAccess
        ?
        "video_library"
        :
        "lock"
        }

        </span>

        </div>



        <div class="video-info">


        <div class="video-title">

        ${c.name.split(":")[0]}

        </div>


        <div class="video-title">

        ${c.label}

        </div>


        </div>


    </div>

    `;


  });


  root.innerHTML = html;


}

window.lockedAlert=function(chapterName){

const contact = confirm(
"This chapter is not included in your current learning package.\n\nWould you like to contact us for access?"
);


if(contact){

const message =
`Hi Sir Maududi, I am interested in getting access to ${chapterName} in Sembang Maths.`;


window.open(
"https://t.me/sembangmath?text=" + encodeURIComponent(message),
"_blank"
);

}

}

/* ================= OPEN CHAPTER ================= */
function openChapter(chapterName){

  selectedChapter = chapterName;


  const tabs = document.querySelector(".tabs");


  // tukar toggle Form 4/5 kepada 2025/2024
  tabs.innerHTML = `

    <div class="tab-slider" id="tabSlider"></div>

    <div class="tab active"
    onclick="switchYear('2025', this)">
        2025
    </div>

    <div class="tab"
    onclick="switchYear('2024', this)">
        2024
    </div>

  `;


  const root = document.getElementById("videoRoot");
  const list = document.getElementById("videoList");

  list.innerHTML = `

<div class="video-search">

<span class="material-symbols-rounded">
search
</span>

<input 
id="videoSearch"
type="text"
placeholder="Search video..."
oninput="searchVideo()">

</div>

`;


  root.style.display="none";
  list.style.display="block";


  document.getElementById("backBtn").style.display="block";

  loadVideos(
    chapterKeyFromName(chapterName),
    "2025"
);


}

function chapterKeyFromName(name){


for(const form in chapters){

const found = chapters[form]
.find(c=>c.name===name);


if(found){

return found.key;

}


}


return null;


}

/* ================= BACK ================= */
function backToVideoRoot(){


document.getElementById("videoRoot").style.display="block";
document.getElementById("videoList").style.display="none";
document.getElementById("backBtn").style.display="none";


// restore Form toggle
document.querySelector(".tabs").innerHTML=`

<div class="tab-slider" id="tabSlider"></div>

<div class="tab ${currentForm==="form4" ? "active":""}" 
onclick="switchForm('form4',this)">
Form 4
</div>


<div class="tab ${currentForm==="form5" ? "active":""}"
onclick="switchForm('form5',this)">
Form 5
</div>

`;


// restore slider position
const slider = document.getElementById("tabSlider");

if(currentForm==="form5"){
    slider.style.transform="translateX(100%)";
}else{
    slider.style.transform="translateX(0%)";
}

}

/* ================= PAGE ================= */
function showPage(){

  const content = `
  <div class="header">
    <div class="hamburger" onclick="toggleSidebar()">☰</div>
    <div class="logo">Video</div>

<div class="tabs">
  <div class="tab-slider" id="tabSlider"></div>

  <div class="tab active" onclick="switchForm('form4', this)">Form 4</div>
  <div class="tab" onclick="switchForm('form5', this)">Form 5</div>
</div>

    <div id="backBtn"
      style="margin-left:auto;cursor:pointer;color:#7a1230;display:none;"
      onclick="backToVideoRoot()">
      <span class="material-symbols-rounded">close</span>
    </div>
  </div>

  <div id="videoRoot"></div>
  <div id="videoList" style="display:none;"></div>
  `;

  document.getElementById("app").innerHTML = content;
  closeSidebar();

  setTimeout(()=>{
    renderChapters("form4"); // DEFAULT FORM 4
  },100);
}

function switchForm(form, el){ 

  currentForm = form;


  document.querySelectorAll(".tab").forEach(t => 
    t.classList.remove("active")
  );

  el.classList.add("active");


  renderChapters(form);


  const slider = document.getElementById("tabSlider");


  if(form === "form5"){
    slider.style.transform = "translateX(100%)";
  }else{
    slider.style.transform = "translateX(0%)";
  }

}

function switchYear(year, el){


document.querySelectorAll(".tab")
.forEach(t=>{
    t.classList.remove("active");
});


el.classList.add("active");



const slider=document.getElementById("tabSlider");


if(year==="2024"){

slider.style.transform="translateX(100%)";

}else{

slider.style.transform="translateX(0%)";

}


// sini nanti load video ikut tahun

loadVideos(
chapterKeyFromName(selectedChapter),
year
);


}


;

</script>


<script type="module">

import {initializeApp}
from
"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";


import {
getAuth,
onAuthStateChanged
}
from
"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";


import {
getFirestore,
doc,
getDoc
}
from
"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";



const firebaseConfig = {

apiKey: "AIzaSyCM7AcvKL5-rTm4kISFjU1GLE2IGU2stUM",
authDomain:"sembang-maths.firebaseapp.com",
projectId:"sembang-maths",
storageBucket:"sembang-maths.firebasestorage.app",
messagingSenderId:"949561490562",
appId:"1:949561490562:web:0adfde880f6de95c03489b"

};


const app = initializeApp(firebaseConfig);

const auth=getAuth(app);

const db=getFirestore(app);

const YOUTUBE_API_KEY = "AIzaSyBVEcKsSpnviAEFMb9dusFKHlXI_vjjYKk";


async function getYoutubeTitle(videoId){

const url =
`https://www.googleapis.com/youtube/v3/videos?id=${videoId}&key=${YOUTUBE_API_KEY}&part=snippet`;


const response = await fetch(url);

const data = await response.json();


if(data.items && data.items.length > 0){

return data.items[0].snippet.title;

}


return "Video";

}


async function loadVideos(chapterKey, year){

const videoList = document.getElementById("videoList");


// kosongkan video lama dahulu
videoList.innerHTML = `
<div style="
text-align:center;
padding:30px;
color:#777;
">
Loading video...
</div>
`;



const snap = await getDoc(
    doc(
        db,
        "videos",
        chapterKey
    )
);

if(!snap.exists()){

videoList.innerHTML = `
<div style="
text-align:center;
padding:30px;
color:#777;
">
Tiada video
</div>
`;

return;

}

const data = snap.data();

const videos = data[year] || [];

window.allVideos = [];


// ambil semua tajuk dulu
for(let index=0; index<videos.length; index++){

    const videoId = videos[index];

    const title = await getYoutubeTitle(videoId);


    window.allVideos.push({

        id:videoId,

        title:title

    });

}


// SORT A-Z
window.allVideos.sort((a,b)=>{

    return a.title.localeCompare(
        b.title,
        'en',
        {
            sensitivity:"base"
        }
    );

});



let html="";


// paparkan ikut susunan baru
window.allVideos.forEach(v=>{


html += `

<div class="video-item"
onclick="playYoutube('${v.id}')">


<img 
src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg"
class="video-thumbnail">


<div class="video-info">

<div class="video-title">
${v.title}
</div>


<div class="video-author">
Sir Maududi
</div>


</div>


</div>

`;

});




document.getElementById("videoList").innerHTML = `

<div class="video-search">

<span class="material-symbols-rounded">
search
</span>

<input 
id="videoSearch"
type="text"
placeholder="Search video..."
oninput="searchVideo()">

</div>

<div id="videoContainer">

${html}

</div>

`;

}

window.loadVideos = loadVideos;

window.playYoutube=function(id){

const overlay=document.getElementById("playerOverlay");

const player=document.getElementById("youtubePlayer");


player.src =
"https://www.youtube.com/embed/"
+id+
"?autoplay=1";


overlay.style.display="flex";

}

window.closePlayer=function(){

const overlay=document.getElementById("playerOverlay");

const player=document.getElementById("youtubePlayer");


overlay.style.display="none";

player.src="";

}

window.userAccess={};



onAuthStateChanged(auth,async(user)=>{


if(user){


const snap=await getDoc(
doc(db,"users",user.uid)
);


if(snap.exists()){

window.userAccess =
snap.data().access || {};

}


showPage();

document.getElementById("loadingScreen").style.display="none";


}

else{

window.userAccess={};

showPage();

document.getElementById("loadingScreen").style.display="none";

}


});


// bawah semua function
window.switchForm = switchForm;
window.renderChapters = renderChapters;
window.openChapter = openChapter;
window.backToVideoRoot = backToVideoRoot;

// CHECK LOGIN STATUS

window.userLogged = false;


onAuthStateChanged(auth, (user)=>{


    if(user){

        console.log("User login:", user.email);

        window.userLogged = true;


        document.getElementById("profileIcon").textContent =
        "account_circle";


    }else{


        console.log("Belum login");

        window.userLogged = false;


        document.getElementById("profileIcon").textContent =
        "person";


    }


});




// PROFILE BUTTON

window.checkProfile = function(){


    if(window.userLogged){


        window.location.href="profile.html";


    }else{


        window.location.href="login.html";


    }


}

window.searchVideo=function(){

const keyword =
document.getElementById("videoSearch")
.value
.toLowerCase()
.trim();


const container =
document.getElementById("videoContainer");


let html="";


window.allVideos
.filter(v=>{

if(keyword===""){
    return true;
}

return v.title.toLowerCase().includes(keyword);

})
.forEach(v=>{


html += `

<div class="video-item"
onclick="playYoutube('${v.id}')">


<img 
src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg"
class="video-thumbnail">


<div class="video-info">


<div class="video-title">
${v.title}
</div>


<div class="video-author">
Sir Maududi
</div>


</div>


</div>

`;

});


container.innerHTML=html;


}

</script>

<div id="playerOverlay" onclick="closePlayer()">

    <div id="playerBox" onclick="event.stopPropagation()">

        <iframe
        id="youtubePlayer"
        src=""
        allowfullscreen>
        </iframe>

    </div>

</div>

</body>
</html>
