<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Live Class</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    background:#111;
    font-family:Arial;
    height:100vh;
    overflow:hidden;
}

/* ===== LIVE ===== */
#liveContainer{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100vh;
}

iframe{
    width:100%;
    height:100vh;
    border:none;
}

/* ===== BLOCK OVERLAY ===== */
#blockOverlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100vh;

    display:none;
    z-index:5;

    background:transparent;
}

/* ===== START OVERLAY ===== */
#startOverlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#startBox{
    background:#fff;
    padding:25px 40px;
    border-radius:14px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    user-select:none;
}

/* ===== CHAT ===== */
#chatContainer{
    position:absolute;
    left:10px;
    bottom:10px;
    width:320px;
    height:80vh;
    display:flex;
    flex-direction:column;
    background:rgba(0,0,0,0.15);
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.1);
    overflow:hidden;
    z-index:10;
}

#chatContainer.hidden{
    transform:translateX(-110%);
    opacity:0;
}

#messages{
    flex:1;
    overflow-y:auto;
    padding:10px;
    color:white;
    font-size:14px;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
}

.msg{
    margin-bottom:6px;
    padding:6px 8px;
    border-radius:10px;
    background:rgba(255,255,255,0.08);
    color:white;
    word-break:break-word;
}

#inputBox{
    display:flex;
    padding:10px;
    gap:5px;
    background:rgba(0,0,0,0.2);
}

input{
    flex:1;
    padding:8px;
    border:none;
    border-radius:6px;
    outline:none;
}

button{
    padding:8px 10px;
    border:none;
    border-radius:6px;
    background:#4CAF50;
    color:white;
    cursor:pointer;
}

/* BUTTON UI */
#toggleChat{
    position:absolute;
    top:10px;
    left:10px;
    z-index:20;
}

#refreshBtn{
    position:absolute;
    top:10px;
    right:10px;
    z-index:20;
}

</style>
</head>

<body>

<!-- START -->
<div id="startOverlay">
    <div id="startBox">▶</div>
</div>

<!-- BUTTONS -->
<button id="toggleChat">💬 Chat</button>
<button id="refreshBtn">🔄 Refresh</button>

<!-- LIVE -->
<div id="liveContainer">
    <iframe id="yt" allowfullscreen></iframe>

    <div id="blockOverlay"></div>
</div>

<!-- CHAT -->
<div id="chatContainer">

    <div id="messages"></div>

    <div id="inputBox">
        <input id="msgInput" placeholder="Tanya soalan..." maxlength="300">
        <button onclick="sendMsg()">Hantar</button>
    </div>

</div>

<script>

/* =====================
   STATE CONTROL
===================== */
let started = false;
let blockTimer = null;

/* =====================
   YOUTUBE
===================== */
const youtubeLink = "X4VbdwhkE10";
const yt = document.getElementById("yt");

function loadVideo(){
    yt.src =
    "https://www.youtube.com/embed/" +
    youtubeLink +
    "?playsinline=1";
}

loadVideo();

/* =====================
   START FLOW
===================== */
const startOverlay = document.getElementById("startOverlay");
const blockOverlay = document.getElementById("blockOverlay");

startOverlay.addEventListener("click", () => {

    startOverlay.style.display = "none";
    started = true;

    if(blockTimer){
        clearTimeout(blockTimer);
    }

    blockTimer = setTimeout(() => {
        blockOverlay.style.display = "block";
    }, 2000);

});

/* =====================
   REFRESH (RESET SEMUA)
===================== */
document.getElementById("refreshBtn").onclick = () => {

    const current = yt.src;

    yt.src = "";

    setTimeout(() => {
        yt.src = current;
    }, 200);

    // RESET STATE
    started = false;
    blockOverlay.style.display = "none";
    startOverlay.style.display = "flex";

    if(blockTimer){
        clearTimeout(blockTimer);
    }
};

/* =====================
   CHAT
===================== */
function sendMsg(){

    const input = document.getElementById("msgInput");
    const msg = input.value.trim();
    if(!msg) return;

    const box = document.getElementById("messages");

    const div = document.createElement("div");
    div.className = "msg";
    div.innerText = "Student: " + msg;

    box.appendChild(div);

    while(box.children.length > 50){
        box.removeChild(box.firstChild);
    }

    input.value = "";
    box.scrollTop = box.scrollHeight;
}

document.getElementById("msgInput").addEventListener("keydown",(e)=>{
    if(e.key==="Enter") sendMsg();
});

/* =====================
   CHAT TOGGLE
===================== */
const chat = document.getElementById("chatContainer");
const btn = document.getElementById("toggleChat");

btn.onclick = ()=>{
    chat.classList.toggle("hidden");
};

</script>

</body>
</html>
