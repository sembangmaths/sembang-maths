<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Live Class</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== PAGE ===== */
body{
    margin:0;
    background:#111;
    font-family:Arial;
    height:100vh;
    overflow:hidden;
    position:relative;
}

/* ===== LIVE VIDEO ===== */
#liveContainer{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100vh;
}

iframe{
    width:100%;
    height:100vh;
    border:none;
    pointer-events:none;
}

/* ===== CHAT ===== */
#chatContainer{
    position:absolute;
    left:10px;
    bottom:10px;
    width:320px;
    height:80vh;

    display:flex;
    flex-direction:column;

    background:rgba(0,0,0,0.15);
    backdrop-filter: blur(0px);

    border-radius:12px;
    border:1px solid rgba(255,255,255,0.1);

    overflow:hidden;

    transition:0.3s;
}

/* hidden mode */
#chatContainer.hidden{
    transform:translateX(-110%);
    opacity:0;
}

/* messages */
#messages{
    flex:1;
    overflow-y:auto;
    padding:10px;
    color:white;
    font-size:14px;

    display:flex;
    flex-direction:column;
    justify-content:flex-end;

    scrollbar-width:none;
}

#messages::-webkit-scrollbar{
    display:none;
}

/* chat bubble */
.msg{
    margin-bottom:6px;
    padding:6px 8px;
    border-radius:10px;

    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);

    color:white;
    text-shadow:0 1px 4px rgba(0,0,0,0.9);
}

/* input */
#inputBox{
    display:flex;
    padding:10px;
    gap:5px;
    border-top:1px solid rgba(255,255,255,0.1);
    background:rgba(0,0,0,0.2);
}

input{
    flex:1;
    padding:8px;
    border:none;
    border-radius:6px;
    outline:none;
}

button{
    padding:8px 10px;
    border:none;
    border-radius:6px;
    background:#4CAF50;
    color:white;
    cursor:pointer;
}

/* toggle button */
#toggleChat{
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;

    padding:8px 12px;
    border:none;
    border-radius:8px;

    background:rgba(0,0,0,0.5);
    color:white;
    cursor:pointer;
}

#refreshBtn{
    position:absolute;
    top:10px;
    right:10px;
    z-index:10;

    padding:8px 12px;
    border:none;
    border-radius:8px;

    background:rgba(0,0,0,0.5);
    color:white;
    cursor:pointer;
}

</style>
</head>

<body>

  <button id="refreshBtn">🔄 Refresh</button>

<!-- TOGGLE BUTTON -->
<button id="toggleChat">💬 Hide Chat</button>

<!-- LIVE -->
<div id="liveContainer">
    <iframe id="yt" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</div>

<!-- CHAT -->
<div id="chatContainer">

    <div id="messages"></div>

    <div id="inputBox">
        <input type="text" id="msgInput" placeholder="Tanya soalan...">
        <button onclick="sendMsg()">Hantar</button>
    </div>

</div>

<script>

  document.getElementById("refreshBtn").addEventListener("click", function(){

    const yt = document.getElementById("yt");

    const current = yt.src;

    yt.src = "";

    setTimeout(() => {
        yt.src = current;
    }, 200);

});

// =====================
// LIVE LINK
// =====================
const youtubeLink = "X4VbdwhkE10";

// =====================
// START LIVE
// =====================
function start(){
    const yt = document.getElementById("yt");

    yt.src = "https://www.youtube.com/embed/" 
            + youtubeLink 
            + "?autoplay=1&mute=1&playsinline=1";
}

start();

// =====================
// CHAT FUNCTION
// =====================
function sendMsg(){

    const input = document.getElementById("msgInput");
    const msg = input.value.trim();
    if(msg === "") return;

    const box = document.getElementById("messages");

    const div = document.createElement("div");
    div.className = "msg";
    div.innerText = "Student: " + msg;

    box.appendChild(div);

    // limit 50 messages
    while(box.children.length > 50){
        box.removeChild(box.firstChild);
    }

    input.value = "";

    box.scrollTop = box.scrollHeight;
}

// Enter key send
document.getElementById("msgInput").addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        sendMsg();
    }
});

// =====================
// HIDE / SHOW CHAT
// =====================
const chat = document.getElementById("chatContainer");
const btn = document.getElementById("toggleChat");

btn.addEventListener("click", function(){
    chat.classList.toggle("hidden");

    if(chat.classList.contains("hidden")){
        btn.innerText = "💬 Show Chat";
    } else {
        btn.innerText = "💬 Hide Chat";
    }
});

</script>

</body>
</html>
