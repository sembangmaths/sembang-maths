<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Live Class</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    background:#111;
    font-family:Arial;
    height:100vh;
    overflow:hidden;
}

/* ===== LIVE ===== */
#liveContainer{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100vh;
}

iframe{
    width:100%;
    height:100vh;
    border:none;
}

/* ===== BLOCK OVERLAY ===== */
#blockOverlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100vh;

    display:none;
    z-index:5;

    background:transparent;
}

/* ===== START OVERLAY ===== */
#startOverlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#startBox{
    background:#fff;
    padding:25px 40px;
    border-radius:14px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    user-select:none;
}

/* ===== CHAT ===== */
#chatContainer{
    position:absolute;
    left:10px;
    bottom:10px;
    width:320px;
    height:80vh;
    display:flex;
    flex-direction:column;
    background:rgba(0,0,0,0.15);
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.1);
    overflow:hidden;
    z-index:10;

    transition:0.3s;
}

/* DEFAULT HIDDEN */
#chatContainer.hidden{
    transform:translateX(-110%);
    opacity:0;
}

#messages{
    flex:1;
    overflow-y:auto;
    padding:10px;
    color:white;
    font-size:14px;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
}

.msg{
    margin-bottom:6px;
    padding:6px 8px;
    border-radius:10px;
    background:rgba(255,255,255,0.08);
    color:white;
    word-break:break-word;
}

#inputBox{
    display:flex;
    padding:10px;
    gap:5px;
    background:rgba(0,0,0,0.2);
}

input{
    flex:1;
    padding:8px;
    border:none;
    border-radius:6px;
    outline:none;
}

button{
    padding:8px 10px;
    border:none;
    border-radius:6px;
    background:#4CAF50;
    color:white;
    cursor:pointer;
}

/* ===== UI BUTTONS ===== */
#uiButtons{
    position:absolute;
    top:10px;
    left:10px;
    right:10px;
    display:flex;
    justify-content:space-between;
    z-index:20;
}

.fab{
    width:46px;
    height:46px;
    border-radius:50%;
    border:none;
    background:rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    transition:.2s;
}

.fab:hover{
    transform:scale(1.08);
    background:rgba(255,255,255,0.2);
}

.fab svg{
    width:22px;
    height:22px;
    fill:white;
}

</style>
</head>

<body>

<!-- START -->
<div id="startOverlay">
    <div id="startBox">▶</div>
</div>

<!-- UI BUTTONS -->
<div id="uiButtons">

    <button id="toggleChat" class="fab">
        <svg viewBox="0 0 24 24">
            <path d="M4 4h16v12H5.17L4 17.17V4zm2 2v7h12V6H6zm0 9h9.17L18 18V15H6v0z"/>
        </svg>
    </button>

    <button id="refreshBtn" class="fab">
        <svg viewBox="0 0 24 24">
            <path d="M17.65 6.35A7.95 7.95 0 0012 4V1L7 6l5 5V7a5 5 0 11-5 5H5a7 7 0 107.65-5.65z"/>
        </svg>
    </button>

</div>

<!-- LIVE -->
<div id="liveContainer">
    <iframe id="yt" allowfullscreen></iframe>
    <div id="blockOverlay"></div>
</div>

<!-- CHAT (DEFAULT HIDDEN) -->
<div id="chatContainer" class="hidden">

    <div id="messages"></div>

    <div id="inputBox">
        <input id="msgInput" placeholder="Tanya soalan..." maxlength="300">
        <button onclick="sendMsg()">Hantar</button>
    </div>

</div>

<script>

/* STATE */
let blockTimer = null;

/* YOUTUBE */
const youtubeLink = "X4VbdwhkE10";
const yt = document.getElementById("yt");

yt.src =
"https://www.youtube.com/embed/" +
youtubeLink +
"?playsinline=1";

/* START FLOW */
const startOverlay = document.getElementById("startOverlay");
const blockOverlay = document.getElementById("blockOverlay");

startOverlay.addEventListener("click", () => {

    startOverlay.style.display = "none";

    if(blockTimer){
        clearTimeout(blockTimer);
    }

    blockTimer = setTimeout(() => {
        blockOverlay.style.display = "block";
    }, 2000);

});

/* REFRESH RESET */
document.getElementById("refreshBtn").onclick = () => {

    const current = yt.src;

    yt.src = "";

    setTimeout(() => {
        yt.src = current;
    }, 200);

    blockOverlay.style.display = "none";
    startOverlay.style.display = "flex";

    if(blockTimer){
        clearTimeout(blockTimer);
    }
};

/* CHAT */
function sendMsg(){

    const input = document.getElementById("msgInput");
    const msg = input.value.trim();
    if(!msg) return;

    const box = document.getElementById("messages");

    const div = document.createElement("div");
    div.className = "msg";
    div.innerText = "Student: " + msg;

    box.appendChild(div);

    while(box.children.length > 50){
        box.removeChild(box.firstChild);
    }

    input.value = "";
    box.scrollTop = box.scrollHeight;
}

document.getElementById("msgInput").addEventListener("keydown",(e)=>{
    if(e.key==="Enter") sendMsg();
});

/* CHAT TOGGLE */
const chat = document.getElementById("chatContainer");
const btn = document.getElementById("toggleChat");

btn.onclick = ()=>{
    chat.classList.toggle("hidden");
};

</script>

</body>
</html>
