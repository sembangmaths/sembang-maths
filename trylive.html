<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Sembang Maths</title>

<!-- FAVICON (browser tab icon) -->
<link rel="icon" type="image/png" href="icon-192.png">

<!-- APPLE ICON (iPhone home screen) -->
<link rel="apple-touch-icon" href="icon-192.png">

<!-- PWA MANIFEST -->
<link rel="manifest" href="manifest.json">

<!-- ICON FONT -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">

<meta name="theme-color" content="#111111">

<style>
body{
    margin:0;
    background:
        radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 40%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.05), transparent 40%),
        #0f0f0f;

    font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial;
    height:100dvh;
    overflow:hidden;
    opacity:1;
    transition:opacity 0.4s ease;
    touch-action: manipulation;
    -webkit-text-size-adjust:100%;
}

/* LIVE */
#liveContainer{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100dvh;
}

iframe{
    width:100%;
    height:100dvh;
    border:none;
}

/* BLOCK */
#blockOverlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100dvh;
    display:none;
    z-index:5;
    background:transparent;
}

/* START OVERLAY */
#startOverlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

/* START BOX GLASS */
#startBox{
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(22px) saturate(150%);
    -webkit-backdrop-filter:blur(22px) saturate(150%);

    border:1px solid rgba(255,255,255,0.14);

    box-shadow:
        0 10px 25px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.12);

    padding:25px 40px;
    border-radius:16px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    user-select:none;
    color:white;
        mix-blend-mode: normal;
    filter: saturate(1) contrast(1);
}

#startBox{
    padding:15px 25px;
}

#startBox .material-symbols-rounded{
    line-height:1;
}

#startBox:hover{
    background:rgba(255,255,255,0.12);
    transform:scale(1.03);
}

/* CHAT CONTAINER GLASS */
#chatContainer{
    position:absolute;
    left:10px;
    bottom:10px;
    width:320px;
    max-height:50dvh;
    display:flex;
    flex-direction:column;

    background:rgba(0, 0, 0, 0.251);


    border-radius:16px;


    overflow:hidden;

    /* 🔥 INI PART FADE */
-webkit-mask-image: linear-gradient(
    to bottom,
    transparent 0%,
    black 20%,
    black 100%
);

mask-image: linear-gradient(
    to bottom,
    transparent 0%,
    black 20%,
    black 100%
);

    z-index: 10;

    clip-path: inset(0 0 0 0);
    transition: clip-path 0.35s ease, opacity 0.35s ease;
}

#chatContainer.hidden{
    clip-path: inset(0 100% 0 0); /* tutup dari kanan */
    opacity:0;
}

/* MESSAGES */
#messages{
    flex:1;
    min-height:0;
    padding:10px;
    color:white;
    font-size:14px;

    display:flex;
    flex-direction:column;
    overflow-y:auto;
    gap:6px;
    scroll-behavior: smooth;
}

#messages::before{
    content:"";
    flex:1;
}

/* hide scrollbar */
#messages::-webkit-scrollbar{
    display:none;
}

#messages{
    scrollbar-width:none;
    -ms-overflow-style:none;
}

/* MESSAGE BUBBLE */
.msg{
    margin-bottom:6px;
    padding:6px 8px;
    border-radius:10px;
    background:rgba(255,255,255,0.08);
    word-break:break-word;
}

/* INPUT AREA GLASS */
#inputBox{
    display:flex;
    align-items:center;
    padding:10px;
    gap:6px;

    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(18px) saturate(180%);
    -webkit-backdrop-filter:blur(18px) saturate(180%);

}

input{
    flex:1;
    padding:8px;
    border:none;
    border-radius:6px;
    outline:none;

    background: rgba(255, 255, 255, 0.15);
        backdrop-filter:blur(18px) saturate(180%);
    -webkit-backdrop-filter:blur(18px) saturate(180%);

    color:white;
}

input,
textarea,
select{
    font-size:16px;
}

/* SEND BUTTON */
#sendBtn{
    width:42px;
    height:42px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;

    background:rgba(255,255,255,0.07);
    backdrop-filter:blur(18px) saturate(180%);
    -webkit-backdrop-filter:blur(18px) saturate(180%);

    border:1px solid rgba(255,255,255,0.15);

    box-shadow:
        0 6px 20px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.15);

    cursor:pointer;
    padding:0;
    transition:0.2s;
}

#sendBtn:hover{
    transform:scale(1.08);
    background:rgba(255,255,255,0.12);
}

#sendBtn svg{
    width:20px;
    height:20px;
    fill:white;
}

/* TOP UI BUTTONS */
#uiButtons{
    position:absolute;
    top:10px;
    left:10px;
    right:10px;
    display:flex;
    justify-content:space-between;
    z-index:10000;
}

/* FAB GLASS BUTTON */
.fab{
    width:46px;
    height:46px;
    border-radius:50%;

    background:rgba(255,255,255,0.07);
    backdrop-filter:blur(18px) saturate(180%);
    -webkit-backdrop-filter:blur(18px) saturate(180%);

    border:1px solid rgba(255,255,255,0.15);

    box-shadow:
        0 6px 20px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.15);

    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    transition:0.2s;
}

.fab:hover{
    transform:scale(1.05);
    background:rgba(255,255,255,0.12);
}

.fab svg{
    width:22px;
    height:22px;
    fill:white;
}

/* PAGE FADE */
body.fade-out{
    opacity:0;
    transition:opacity 0.4s ease;
}

.reaction-bubble{
    position:fixed;
    bottom:0;
    font-size:32px;
    animation: floatUp 2.5s ease-out forwards;
    pointer-events:none;
    z-index:99999;
    filter: drop-shadow(0 6px 10px rgba(0,0,0,0.4));
}

@keyframes floatUp{
    0%{
        transform: translateY(0) scale(1);
        opacity:1;
    }
    100%{
        transform: translateY(-50vh) scale(2);
        opacity:0;
    }
}

#reactionBar{
    position:absolute;
    bottom:90px;
    right:10px;

    display:flex;
    flex-direction:column;
    gap:10px;

    z-index:25;
}

#reactionBar button{
    width:46px;
    height:46px;
    border-radius:50%;
    border:none;
    cursor:pointer;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    color:white;
    font-size:20px;
    touch-action: manipulation;

    box-shadow:0 6px 20px rgba(0,0,0,0.3);
    transition:0.2s;
}

#reactionBar button:hover{
    transform:scale(1.1);
    background:rgba(255,255,255,0.15);
}

#reactionToggle{
    width:46px;
    height:46px;
    border-radius:50%;
    border:none;
    cursor:pointer;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    color:white;

    font-size:10px; /* kecilkan */
    line-height:1;

    display:flex;
    align-items:center;
    justify-content:center;

    transition:0.2s;
    box-shadow:0 6px 20px rgba(0,0,0,0.3);

    text-align:center;
}

#reactionToggle.off{
    background:rgba(255, 80, 80, 0.25);
    color:#ffb3b3;
}

#reactionToggle:hover{
    transform:scale(1.1);
}

#reactionBar button:disabled{
    filter: grayscale(1);
}

#toast{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,.8);
    color:#fff;
    padding:12px 18px;
    border-radius:10px;
    opacity:0;
    transition:.3s;
    pointer-events:none;
    z-index:999999;
}

#toast.show{
    opacity:1;
}

.loading{
    font-size:40px;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

#topBlock,
#bottomBlock{
    position:fixed;
    left:0;
    width:100%;
    background:transparent;
    z-index:5;   /* bawah startOverlay (9999), atas semua yang lain */
    pointer-events:auto;
}

#topBlock{
    top:0;
    height:43dvh;
}

#bottomBlock{
    bottom:0;
    height:43dvh;
}

</style>
</head>

<body>

<div id="toast"></div>

<div id="topBlock"></div>
<div id="bottomBlock"></div>

<div id="startOverlay">
    <div id="startBox">
        <span class="material-symbols-rounded loading">
            progress_activity
        </span>
    </div>
</div>

<div id="uiButtons">

    <div class="leftBtns">
        <button id="toggleChat" class="fab">
            <svg viewBox="0 0 24 24">
                <path d="M4 4h16v12H5.17L4 17.17V4zm2 2v7h12V6H6zm0 9h9.17L18 18V15H6v0z"/>
            </svg>
        </button>
    </div>

    <div class="rightBtns">
        <button id="homeBtn" class="fab">
            <svg viewBox="0 0 24 24">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
            </svg>
        </button>

        <button id="refreshBtn" class="fab">
            <svg viewBox="0 0 24 24">
                <path d="M17.65 6.35A7.95 7.95 0 0012 4V1L7 6l5 5V7a5 5 0 11-5 5H5a7 7 0 107.65-5.65z"/>
            </svg>
        </button>
    </div>

</div>

<div id="reactionBar">
    <button id="btnLove" onclick="sendReaction('love')">❤️</button>
    <button id="btnCry" onclick="sendReaction('cry')">😭</button>
    <button id="btnLike" onclick="sendReaction('like')">👍</button>

    <button id="reactionToggle" onclick="toggleReactions()">on</button>
</div>

<div id="liveContainer">
    <iframe id="yt" allowfullscreen></iframe>
    <div id="blockOverlay"></div>
</div>

<div id="chatContainer" class="hidden">
    <div id="messages">
</div>

    <div id="inputBox">
        <input id="msgInput" maxlength="300">

        <button id="sendBtn" onclick="sendMsg()">
            <svg viewBox="0 0 24 24">
                <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
            </svg>
        </button>
    </div>
</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { 
  getFirestore, doc, getDoc,
  collection, addDoc,
  serverTimestamp,
  onSnapshot,
  query,
  orderBy,
  limit
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import { deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {

apiKey: "AIzaSyCM7AcvKL5-rTm4kISFjU1GLE2IGU2stUM",
authDomain:"sembang-maths.firebaseapp.com",
projectId:"sembang-maths",
storageBucket:"sembang-maths.firebasestorage.app",
messagingSenderId:"949561490562",
appId:"1:949561490562:web:0adfde880f6de95c03489b"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ELEMENT */
const startOverlay = document.getElementById("startOverlay");
const liveContainer = document.getElementById("liveContainer");
const blockOverlay = document.getElementById("blockOverlay");
const yt = document.getElementById("yt");

/* STATE */
let youtubeReady = false;
let blockTimer = null;

let currentUserName = "Student";
let currentUser = null;
let chatStarted = false;
let lastSendTime = 0;

const COOLDOWN = 10000;

let reactionTimestamps = [];
const REACTION_LIMIT = 10;
const REACTION_WINDOW = 10000; // 10 saat


let isInitialLoad = true;

const reactionButtons = [
    document.getElementById("btnLove"),
    document.getElementById("btnCry"),
    document.getElementById("btnLike")
];

let showReactions = JSON.parse(localStorage.getItem("showReactions") ?? "true");

function updateReactionUI(){
    const toggleBtn = document.getElementById("reactionToggle");

    toggleBtn.innerText = showReactions ? "on" : "off";
    toggleBtn.classList.toggle("off", !showReactions);

    reactionButtons.forEach(btn => {
        btn.disabled = !showReactions;
        btn.style.opacity = showReactions ? "1" : "0.3";
    });
}

function toggleReactions(){
    showReactions = !showReactions;
    localStorage.setItem("showReactions", JSON.stringify(showReactions));

    updateReactionUI();

}
window.toggleReactions = toggleReactions;

function canSendReaction(){
    const now = Date.now();

    // buang yang lebih 10 saat
    reactionTimestamps = reactionTimestamps.filter(t => now - t < REACTION_WINDOW);

    if(reactionTimestamps.length >= REACTION_LIMIT){
        return false;
    }

    reactionTimestamps.push(now);
    return true;
}

/* LOAD LIVE FROM FIRESTORE */
async function loadLive(){

    try {

        const ref = doc(db, "live", "current");
        const snap = await getDoc(ref);

            console.log("SNAP EXISTS:", snap.exists());
            console.log("SNAP DATA:", snap.data());
                console.log("YOUTUBE ID:", snap.data()?.youtubeId);

        if(!snap.exists()){
            console.log("❌ Document tak wujud");
            return;
        }

        const data = snap.data();

        console.log("📦 Data Firestore:", data);

        const youtubeId = data.youtubeId;

        if(!youtubeId){
            console.log("❌ youtubeId kosong");
            return;
        }


const iframe = document.getElementById("yt");

const url = `https://www.youtube.com/embed/${youtubeId}?autoplay=1&playsinline=1`;

console.log("▶ Loading:", url);

// Tunggu iframe selesai load
iframe.onload = () => {

    setTimeout(() => {

        youtubeReady = true;

        const startBox = document.getElementById("startBox");

        startBox.innerHTML = `
            <div style="display:flex; flex-direction:column; align-items:center; gap:5px;">
                <span class="material-symbols-rounded" style="font-size:50px;">
                    play_circle
                </span>

                <span style="font-size:14px; font-weight:normal;">
                    Double click
                </span>
            </div>
        `;

        startBox.style.cursor = "pointer";

    }, 1000);

};

// FORCE RESET supaya iframe render semula
iframe.src = url;

    } catch (err){
        console.error("🔥 Firestore error:", err);
    }

}

window.sendReaction = async (type) => {

    if(!canSendReaction()){
        showToast("You're sending reactions a bit too fast.");
        return;
    }

    await addDoc(collection(db, "reactions_live"), {
        type,
        createdAt: serverTimestamp()
    });
};

const reactionMap = {
    love: "❤️",
    cry: "😭",
    like: "👍"
};

function spawnReactionBubble(type){

    if(!showReactions) return; // ⛔ user off, tak nampak apa-apa

    const bubble = document.createElement("div");
    bubble.className = "reaction-bubble";

    bubble.innerText = reactionMap[type] || "❤️";

    bubble.style.left = Math.random() * 90 + "vw";

    document.body.appendChild(bubble);

    setTimeout(() => {
        bubble.remove();
    }, 2500);
}

function listenReactions(){

    const q = query(
        collection(db, "reactions_live"),
        orderBy("createdAt", "desc"),
        limit(20)
    );

    onSnapshot(q, (snapshot) => {

        if(isInitialLoad){
            isInitialLoad = false;
            return; // ⛔ jangan render data lama masa first load
        }

        snapshot.docChanges().forEach((change) => {
            if(change.type === "added"){
                spawnReactionBubble(change.doc.data().type);
            }
        });
    });
} 

function showToast(text){

    const t=document.getElementById("toast");

    t.textContent=text;
    t.classList.add("show");

    clearTimeout(t.timer);

    t.timer=setTimeout(()=>{
        t.classList.remove("show");
    },2500);

}


/* AUTH CHECK */
onAuthStateChanged(auth, async (user) => {

    if(user){
        currentUser = user;

        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);

        if(userSnap.exists()){
            currentUserName = userSnap.data().name || user.email;
        } else {
            currentUserName = user.email;
        }

        liveContainer.style.display = "block";
        startOverlay.style.display = "flex";

loadLive();
listenChat();
listenReactions();
    } 
    else {
        startOverlay.innerHTML = "<div id='startBox'>Please sign in to continue</div>";
        document.getElementById("startBox").onclick = () => {
            window.location.href = "login.html";
        };
        startOverlay.style.display = "flex";
        liveContainer.style.display = "none";
    }
});     

/* START */
startOverlay.addEventListener("click", () => {

    if(!youtubeReady){
        return; // masih loading
    }

    startOverlay.style.display = "none";

    if(blockTimer) clearTimeout(blockTimer);

    const isTouchDevice = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

    const delay = isTouchDevice
        ? 1500   // phone, tablet, iPad
        : 100;   // laptop / desktop

    blockTimer = setTimeout(() => {
        blockOverlay.style.display = "block";
    }, delay);

});

document.getElementById("homeBtn").onclick = () => {
    document.body.classList.add("fade-out");

    setTimeout(() => {
        window.location.href = "index.html";
    }, 400); // ikut duration CSS
};

/* REFRESH */
document.getElementById("refreshBtn").onclick = () => {


    yt.src = "";


    youtubeReady = false;


    document.getElementById("startBox").innerHTML = `
    <span class="material-symbols-rounded loading">
        progress_activity
    </span>
    `;


    blockOverlay.style.display = "none";
    startOverlay.style.display = "flex";


    if(blockTimer) clearTimeout(blockTimer);



    // ambil semula youtubeId dari Firestore
    loadLive();


};

/* CHAT */
async function sendMsg(){
    const input = document.getElementById("msgInput");
    const msg = input.value.trim();

    if(!msg || !currentUser) return;
    if(!canSendMessage()) return;

    const temp = msg;
    input.value = "";
    input.disabled = true;

    try {
        await addDoc(collection(db, "chats"), {
            name: currentUserName,
            message: temp,
            uid: currentUser.uid,
            role: "student",
            type: "normal",
            createdAt: serverTimestamp()
        });
    } finally {
        input.disabled = false;
        input.focus();
    }
}


function listenChat(){
    if(chatStarted) return;
    chatStarted = true;

    const q = query(
        collection(db, "chats"),
        orderBy("createdAt", "desc"),
        limit(20)
    );

    const box = document.getElementById("messages");
    let initialScrollDone = false;

    onSnapshot(q, (snapshot) => {

        // 🔥 CLEAR + RENDER FULL LIST
        box.innerHTML = "";

        const docs = snapshot.docs.reverse(); // supaya oldest → newest

        docs.forEach(docSnap => {
            const data = docSnap.data();

            const div = document.createElement("div");
            div.className = "msg";

            let timeText = "";
            if(data.createdAt){
                const date = data.createdAt.toDate();
                timeText = date.toLocaleTimeString([], {
                    hour: "2-digit",
                    minute: "2-digit"
                });
            }

            div.innerHTML = `
                <div style="display:flex; flex-direction:column; gap:2px;">
                    <div>${data.name}: ${data.message}</div>
                    <div style="align-self:flex-end;font-size:8px;opacity:0.6;">
                        ${timeText}
                    </div>
                </div>
            `;

            box.appendChild(div);
        });

        // 🔥 FIRST LOAD → scroll bawah
        if(!initialScrollDone){
            requestAnimationFrame(() => {
                box.scrollTop = box.scrollHeight;
            });

            initialScrollDone = true;
            return;
        }

        // 🔥 SMART AUTO SCROLL
        const nearBottom = 
            box.scrollTop + box.clientHeight >= box.scrollHeight - 50;

        if(nearBottom){
            requestAnimationFrame(() => {
                box.scrollTop = box.scrollHeight;
            });
        }
    });
}


function canSendMessage(){

    const now = Date.now();
    const remaining = COOLDOWN - (now - lastSendTime);

if(remaining > 0){
    showToast(`Please wait ${Math.ceil(remaining/1000)} seconds before sending your next message.`);
    return false;
}

    lastSendTime = now; 
    return true;
}


window.sendMsg = sendMsg;

/* CHAT TOGGLE */
document.getElementById("toggleChat").onclick = () => {
    document.getElementById("chatContainer").classList.toggle("hidden");
};

document.addEventListener("contextmenu", function(e){
    e.preventDefault();
});

/* OPTIONAL: block shortcut devtools */
document.addEventListener("keydown", function(e){

    if(e.key === "F12"){
        e.preventDefault();
    }

    if(e.ctrlKey && e.shiftKey && ["I","J","C"].includes(e.key)){
        e.preventDefault();
    }

    if(e.ctrlKey && e.key.toLowerCase() === "u"){
        e.preventDefault();
    }
});



</script>

<script src="preload.js"></script>

</body>
</html>
