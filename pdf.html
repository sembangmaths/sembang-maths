<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sembang Maths</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">
<link rel="stylesheet" href="pdf.css">

</head>

<body>

<div class="overlay" onclick="closeSidebar()" id="overlay"></div>

<div class="sidebar" id="sidebar">

    <div class="sidebar-profile" onclick="window.location.href='login.html'">
    <span class="material-symbols-rounded">person</span>
</div>

<div class="menu-item" onclick="setActive(this); window.location.href='index.html'">
    <span class="material-symbols-rounded">home</span>
    <div class="label">Home</div>
</div>

<div class="menu-item" onclick="setActive(this); window.location.href='video.html'">
    <span class="material-symbols-rounded">description</span>
    <div class="label">Video</div>
</div>

<div class="menu-item active" onclick="setActive(this)">
    <span class="material-symbols-rounded">play_circle</span>
    <div class="label">PDF</div>
</div>

</div>

<div id="app"></div>

<!-- PDF MODAL -->
<div id="pdfModal">
    <div id="pdfHeader">
        <button onclick="closePDF()">Back</button>
        <div>PDF Viewer</div>
        <button onclick="openTabPDF()">Download</button>
    </div>
    <iframe id="pdfFrame"></iframe>
</div>

<script>

let selectedTrial = "";
let pdfCurrent = "";

/* ACTIVE */
function setActive(el){
    document.querySelectorAll(".menu-item").forEach(i=>{
        i.classList.remove("active");
    });
    el.classList.add("active");
}

/* SIDEBAR */
function openSidebar(){
    document.getElementById("sidebar").classList.add("active");
    document.getElementById("overlay").classList.add("active");
}

function closeSidebar(){
    document.getElementById("sidebar").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
}

function toggleSidebar(){
    document.getElementById("sidebar").classList.contains("active")
        ? closeSidebar()
        : openSidebar();
}

/* ================= CHAPTER DATA ================= */
const trials = {
  Soalan: [
    { name: "Trial 2024", slug: "trial-2024" },
    { name: "Trial 2025", slug: "trial-2025" },
  ],

  Skema: [
    { name: "Skema Trial 2024", slug: "skema-2024" },
    { name: "Skema Trial 2025", slug: "skema-2025" },
  ],
};

/* ================= TAB SWITCH ================= */
function switchForm(Soalan, el){

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");

  renderTrials(Soalan);
}


function renderTrials(type){

  const root = document.getElementById("pdfRoot");

  let html = "";

  trials[type].forEach(c=>{
    html += `
      <div class="pdf-card" style="display:flex; align-items:center; justify-content:space-between; padding:12px 14px;">

        <!-- LEFT: folder info (klik buka folder) -->
        <div onclick="openTrial('${c.name}', '${c.slug}')"
             style="display:flex; gap:14px; align-items:center; flex:1; cursor:pointer;">

          <div class="pdf-icon">
            <span class="material-symbols-rounded">folder</span>
          </div>

          <div class="pdf-info">
            <div class="pdf-title">${c.name}</div>
          </div>

        </div>

        <!-- RIGHT: copy icon -->
        <div onclick="copyFolderLink('${c.slug}')"
             style="cursor:pointer; padding:8px; border-radius:8px;">
          <span class="material-symbols-rounded" style="font-size:22px; color:#7a1230;">
            link
          </span>
        </div>

      </div>
    `;
  });

  root.innerHTML = html;
}

function openTrial(trialName, slug){

    selectedTrial = trialName;

    document.getElementById("pdfRoot").style.display = "none";    
    document.getElementById("pdfList").style.display = "block";

    document.getElementById("backBtn").style.display = "block";

    hideTabs();

    // 🔥 simpan dalam URL
    location.hash = "folder=" + slug;

    loadPDF(trialName);
}

function backToPdfRoot(){
    document.getElementById("pdfRoot").style.display = "block";
    document.getElementById("pdfList").style.display = "none";
    document.getElementById("backBtn").style.display = "none";

    showTabs(); // 🔥 TAMBAH INI
}

function showTabs(){
    document.getElementById("tabs").style.display = "flex";
}

function hideTabs(){
    document.getElementById("tabs").style.display = "none";
}

function copyFolderLink(slug){

    const link = window.location.origin + window.location.pathname + "#folder=" + slug;

    navigator.clipboard.writeText(link);

    alert("Link folder copied!");
}

/* ================= PAGE ================= */
function showPage(){

  const content = `
  <div class="header">
    <div class="hamburger" onclick="toggleSidebar()">☰</div>
    <div class="logo">Video</div>

<div class="tabs" id="tabs">
  <div class="tab-slider" id="tabSlider"></div>

  <div class="tab active" onclick="switchForm('Soalan', this)">Soalan</div>
  <div class="tab" onclick="switchForm('Skema', this)">Skema</div>
</div>

    <div id="backBtn"
      style="margin-left:auto;cursor:pointer;color:#7a1230;display:none;"
      onclick="backToPdfRoot()">
      <span class="material-symbols-rounded">close</span>
    </div>
  </div>

  <div id="pdfRoot"></div>
  <div id="pdfList" style="display:none;"></div>
  `;

  document.getElementById("app").innerHTML = content;
  closeSidebar();

  setTimeout(()=>{
    renderTrials("Soalan"); // DEFAULT SOALAN
  },100);
}

document.addEventListener("click", function(e){
    if(e.target && e.target.id === "backBtn"){
        backToPdfRoot();
    }
});

function switchForm(type, el){

  document.querySelectorAll(".tab").forEach(t=>{
    t.classList.remove("active");
  });

  el.classList.add("active");

  renderTrials(type);

  const slider = document.getElementById("tabSlider");

  if(type === "Skema"){
    slider.style.transform = "translateX(100%)";
  } else {
    slider.style.transform = "translateX(0%)";
  }
}

window.addEventListener("load", async ()=>{

    const hash = location.hash;

    if(!hash.startsWith("#pdf=")) return;

    const slug = hash.replace("#pdf=","");

    const url = "https://script.google.com/macros/s/AKfycbxlrf7W26e-Cw8oyEPmaGk5V4SmZyjFMoNLhDpaoMxjdAbycEbt2WGyoE1FxKuFMmel/exec";

    const res = await fetch(url);
    const data = await res.json();

    const item = data.find(x => x.Slug === slug);

    if(item){
        showPage("pdf");
        setTimeout(()=>{
            openPDF(item.Link, item.Slug);
        },500);
    }
});

/* LOAD PDF */
async function loadPDF(trial){

    const list = document.getElementById("pdfList");

    // 🔥 show loading dulu
list.innerHTML = `
    <div class="loading"
         style="text-align:center; padding:15px; color:#777;">
        Loading...
    </div>
`;

    const url = "https://script.google.com/macros/s/AKfycbxlrf7W26e-Cw8oyEPmaGk5V4SmZyjFMoNLhDpaoMxjdAbycEbt2WGyoE1FxKuFMmel/exec";

    try {
        const res = await fetch(url);
        const data = await res.json();

        let html = "";

        // 🔥 TAK FILTER (buat dulu test stabil)
        data
  .filter(item => item.Trial === trial)
  .forEach(item => {

            html += `
            <div class="pdf-card">

                <div onclick="openPDF('${item.Link}','')" 
                     style="flex:1; display:flex; gap:14px; align-items:center;">

                    <div class="pdf-icon">
                        <span class="material-symbols-rounded">picture_as_pdf</span>
                    </div>

                    <div class="pdf-info">
                        <div class="pdf-title">${item.Title}</div>
                        <div class="pdf-author">Sir Maududi</div>
                    </div>

                </div>

            </div>
            `;
        });

        list.innerHTML = html;

    } catch (err) {
        list.innerHTML = `
            <div style="text-align:center; padding:20px; color:red;">
                Error load PDF
            </div>
        `;
    }
}

/* INIT */
showPage("pdf");


/* OPEN PDF */
function openPDF(link, slug){

if(!link) return;

let id = link.match(/[-\w]{25,}/);

let view = id 
    ? `https://drive.google.com/file/d/${id[0]}/preview`
    : link;

pdfCurrent = view.replace("/preview", "/view");

if(slug){
    location.hash = "pdf=" + slug;
}

document.getElementById("pdfFrame").src = view;
document.getElementById("pdfModal").style.display = "flex";
}

/* CLOSE PDF */
function closePDF(){
    document.getElementById("pdfModal").style.display = "none";
    document.getElementById("pdfFrame").src = "";
}

/* DOWNLOAD PDF */
function openTabPDF(){
    if(!pdfCurrent) return;

    let downloadLink = pdfCurrent.replace("/view", "/export?format=pdf");

    window.open(downloadLink, "_blank");
}

function copyLink(slug){

    const link = window.location.origin + "#pdf=" + slug;
    navigator.clipboard.writeText(link);
    alert("Link copied!");
}


</script>

</body>

</html>
