<!DOCTYPE html>
<html lang="ms">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Sembang Maths</title>

<link rel="icon" type="image/png" href="icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,0..200" rel="stylesheet">

<link rel="stylesheet" href="pdf.css">

</head>


<body>

<div id="favouriteLoading">

    <div class="favourite-loader"></div>

    <p>
        Loading...
    </p>

</div>


<div class="overlay" onclick="closeSidebar()" id="overlay"></div>


<div class="sidebar" id="sidebar">


<div class="sidebar-profile" onclick="checkProfile()">
<div id="profileIcon"></div>
</div>


<div class="menu-item" onclick="window.location.href='index.html'">

<span class="material-symbols-rounded">
home
</span>

<div class="label">
Home
</div>

</div>


<div class="menu-item" onclick="window.location.href='video.html'">

<span class="material-symbols-rounded">
play_circle
</span>

<div class="label">
Video
</div>

</div>


<div class="menu-item" onclick="window.location.href='pdf.html'">

<span class="material-symbols-rounded">
description
</span>

<div class="label">
PDF
</div>

</div>





<div class="menu-item" onclick="window.location.href='qna.html'">

<span class="material-symbols-rounded">
forum
</span>

<div class="label">
Q&A
</div>

</div>

<div class="menu-item active">

<span class="material-symbols-rounded">
bookmark
</span>

<div class="label">
Favourite
</div>

</div>

</div>



<div id="app"></div>



<div id="pdfModal">

<div id="pdfHeader">

<button onclick="closePDF()">
Back
</button>


<div>
PDF Viewer
</div>


</div>


<iframe id="pdfFrame"></iframe>


</div>





<script>


const PDF_API =
"https://script.google.com/macros/s/AKfycbxA1tFgvgFu7RBTFb-zoE9CIF06JW5t6X4d3VGyws62yJxHewGuLnyjGJj2pB-naaFM/exec";


let allPDF=[];
let pdfCurrent="";
let favouriteVideo=[];
let videoData=[];



function openSidebar(){

document.getElementById("sidebar")
.classList.add("active");

document.getElementById("overlay")
.classList.add("active");

}


function closeSidebar(){

document.getElementById("sidebar")
.classList.remove("active");

document.getElementById("overlay")
.classList.remove("active");

}


function toggleSidebar(){

document.getElementById("sidebar")
.classList.contains("active")
?
closeSidebar()
:
openSidebar();

}



function showPage(){


document.getElementById("app").innerHTML=`

<div class="header">

<div class="hamburger" onclick="toggleSidebar()">
☰
</div>


<div class="logo">
Favourite
</div>


</div>



<h3 class="fav-title">Video</h3>

<div id="videoItems"></div>


<h3 class="fav-title">PDF</h3>

<div id="pdfItems"></div>


`;

}



async function fetchPDF(){


const res = await fetch(PDF_API);

allPDF = await res.json();


}



function renderFavourite(){


const root=document.getElementById("videoItems");


const fav=window.favouriteVideo || [];


if(fav.length===0){

root.innerHTML=`

<div style="
text-align:center;
padding:30px;
color:#777;
">

You haven't added any favourite videos yet.

</div>

`;

return;

}


let html="";


fav.forEach(v=>{


html+=`

<div class="pdf-card"
style="
display:flex;
align-items:center;
gap:14px;
">


<div onclick="openVideo('${v.id}')"
style="
flex:1;
display:flex;
align-items:center;
gap:14px;
cursor:pointer;
">


<img 
src="${v.thumbnail}"
style="
width:130px;
border-radius:12px;
">


<div class="pdf-info">

<div class="pdf-title">
${v.title}
</div>


<div class="pdf-author">
Sir Maududi
</div>


</div>


</div>


<div onclick="removeFavouriteVideo(event,'${v.id}')"
style="
padding:8px;
cursor:pointer;
">

<span class="material-symbols-rounded bookmark-icon active">
bookmark
</span>

</div>


</div>

`;

});


root.innerHTML=html;


}

function renderFavouritePDF(){


const root=document.getElementById("pdfItems");


const fav=window.favouritePDF || [];


const list=
allPDF.filter(item=>
fav.includes(item.FileId)
);



if(list.length===0){

root.innerHTML=`

<div style="
text-align:center;
padding:30px;
color:#777;
">

You haven't added any favourite PDFs yet.

</div>

`;

return;

}



let html="";


list.forEach(item=>{


html+=`

<div class="pdf-card"
style="
display:flex;
align-items:center;
justify-content:space-between;
">


<div onclick="openPDF('${item.FileId}')"
style="
flex:1;
display:flex;
gap:14px;
align-items:center;
cursor:pointer;
">


<div class="pdf-icon">

<span class="material-symbols-rounded">
picture_as_pdf
</span>

</div>


<div class="pdf-info">

<div class="pdf-title">
${item.Title}
</div>


<div class="pdf-author">
Sir Maududi
</div>

</div>


</div>



<div onclick="removeFavourite(event,'${item.FileId}')"
style="
padding:8px;
cursor:pointer;
">


<span class="material-symbols-rounded bookmark-icon active">

bookmark

</span>


</div>


</div>

`;

});


root.innerHTML=html;


}

window.playFavourite=function(id){

window.location.href=
"video.html?play="+id;

}




function openPDF(id){


pdfCurrent=id;


document.getElementById("pdfFrame").src=
"https://drive.google.com/file/d/"
+id+
"/preview";


document.getElementById("pdfModal")
.style.display="flex";


}


function closePDF(){

document.getElementById("pdfModal")
.style.display="none";


document.getElementById("pdfFrame")
.src="";


}


window.openVideo=function(id){


const player =
document.getElementById("youtubePlayer");


player.src =
"https://www.youtube.com/embed/"
+id+
"?autoplay=1";


document.getElementById("playerOverlay")
.style.display="flex";


}


window.closePlayer=function(){

document.getElementById("playerOverlay")
.style.display="none";


document.getElementById("youtubePlayer")
.src="";


}



</script>






<script type="module">


import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";


import {

getAuth,
onAuthStateChanged

}
from
"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";


import {

getFirestore,
doc,
getDoc,
updateDoc,
arrayRemove,
arrayUnion

}
from
"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";



const firebaseConfig = {

apiKey: "AIzaSyCM7AcvKL5-rTm4kISFjU1GLE2IGU2stUM",

authDomain:"sembang-maths.firebaseapp.com",

projectId:"sembang-maths",

storageBucket:"sembang-maths.firebasestorage.app",

messagingSenderId:"949561490562",

appId:"1:949561490562:web:0adfde880f6de95c03489b"

};



const app=initializeApp(firebaseConfig);


const auth=getAuth(app);


const db=getFirestore(app);

window.removeFavourite = async function(e,fileId){

e.stopPropagation();

const user = auth.currentUser;

if(!user) return;


await updateDoc(
doc(db,"users",user.uid),
{
favouritePDF:
arrayRemove(fileId)
}
);


window.favouritePDF =
window.favouritePDF.filter(
id=>id!==fileId
);


renderFavouritePDF();

}

window.removeFavouriteVideo = async function(e,id){

e.stopPropagation();

const user = auth.currentUser;

if(!user) return;


const item =
window.favouriteVideo.find(
v=>v.id===id
);


await updateDoc(
doc(db,"users",user.uid),
{
favouriteVideo:
arrayRemove(item)
}
);


window.favouriteVideo =
window.favouriteVideo.filter(
v=>v.id!==id
);


renderFavourite();

}



window.userLogged=false;

window.favouritePDF=[];



onAuthStateChanged(auth,async(user)=>{


if(user){


window.userLogged=true;



const snap =
await getDoc(
doc(db,"users",user.uid)
);



if(snap.exists()){


const userData = snap.data();


window.favouritePDF =
userData.favouritePDF || [];



window.favouriteVideo =
(userData.favouriteVideo || [])
.filter(v =>
userData.access?.[v.chapter] === true
);



favouriteVideo = window.favouriteVideo;


}



await fetchPDF();


showPage();

renderFavourite();

renderFavouritePDF();

document.getElementById("favouriteLoading").style.display="none";



}else{


window.location.href="login.html";


}



});



window.checkProfile=function(){

window.location.href=
window.userLogged
?
"profile.html"
:
"login.html";


}


</script>



<script type="module" src="user-profile.js"></script>

<div id="playerOverlay"
onclick="closePlayer()"
style="
display:none;
position:fixed;
inset:0;
background:#000;
z-index:4000;
align-items:center;
justify-content:center;
">


<iframe
id="youtubePlayer"
style="
width:100%;
height:100%;
border:0;
"
allowfullscreen>
</iframe>


</div>


</body>

</html>
